name: Model pipeline (reusable)

# The model run as individual phases on the SAME `laplace` DB the seed ladder
# populated (no nuke): ingest token×token bilinear circuits → verify idempotency
# → verify kinds → rebuild Glicko-2 consensus over seed+model evidence →
# ranked-μ SQL query (no GPU) → synthesize a GGUF from the substrate → verify
# the GGUF. Each phase is its OWN JOB chained by `needs:` (not a step inside one
# monolith): per-phase pass/fail status, and "Re-run failed jobs" resumes at the
# failed phase instead of replaying the whole pipeline. The OV/FFN emit floor is
# the LAPLACE_OVFFN_FLOOR knob (QK keeps its own pre-softmax floor). Called by
# integration.yml.
on:
  workflow_call:
    inputs:
      model_dir:
        description: "Model directory to ingest + synthesize from"
        type: string
        default: "/vault/models/models--TinyLlama--TinyLlama-1.1B-Chat-v1.0/snapshots/fe8a4ea1ffedaf415f4da2f062534de366a451e6"
      ovffn_floor:
        description: "OV/FFN circuit emit floor (|score| threshold)"
        type: string
        default: "5e-3"

permissions:
  contents: read

# Workflow-level env — declared ONCE, inherited by every job below (GitHub
# Actions env hierarchy: workflow → job → step). No per-job copies.
env:
  MODEL_DIR: ${{ inputs.model_dir }}
  GGUF_OUT: /tmp/tinyllama-substrate-ci.gguf
  LAPLACE_OVFFN_FLOOR: ${{ inputs.ovffn_floor }}
  CLI: "dotnet run --project app/Laplace.Cli/Laplace.Cli.csproj -c Release --no-build --"

jobs:
  ingest:
    name: "ingest — token×token bilinear circuits (onto the seeded DB; NO nuke)"
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: ingest
        run: scripts/ingest-source.sh model "$MODEL_DIR"

  idempotency:
    name: "verify — re-ingest short-circuits (no double-counting)"
    needs: ingest
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: re-ingest must short-circuit
        run: |
          out="$(scripts/ingest-source.sh model "$MODEL_DIR" 2>&1)"; echo "$out"
          echo "$out" | grep -qi "already ingested" || { echo "::error::re-ingest did not short-circuit — idempotency broken"; exit 1; }

  kinds:
    name: "verify — model relation kinds present in CONSENSUS above floor"
    needs: idempotency
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      # Production mode accumulates observations into consensus at ingest and
      # records NO evidence rows — so the gate counts CONSENSUS relations per
      # kind (the substance inference reads), not evidence stats.
      #   ATTENDS (QK), OV_RELATES (OV), COMPLETES_TO (FFN) — [n-gram] ⇒ {tokens}.
      # (The old Q_PROJECTS/O_PROJECTS/DOWN_PROJECTS/EMBEDS/NORMALIZES per-circuit
      # bilinear kinds are the disease and are intentionally NOT emitted.)
      - name: gate kinds (consensus)
        run: |
          P(){ psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -tAc "$1"; }
          K(){ echo "public.laplace_hash128_blake3(convert_to('substrate/kind/$1/v1','UTF8'))"; }
          gate() {  # $1 kind  $2 min
            n=$(P "SELECT count(*) FROM laplace.consensus WHERE kind_id = $(K "$1");")
            [ "${n:-0}" -ge "$2" ] || { echo "::error::consensus kind $1 has ${n:-0} relations (need >= $2)"; exit 1; }
            echo "  ✓ $1 = $n consensus relations"
          }
          gate ATTENDS       1000
          gate OV_RELATES    1000
          gate COMPLETES_TO  1000

  consensus:
    name: "consensus — verify the per-period fold ran at ingest (no batch rebuild exists)"
    needs: kinds
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      # Consensus accumulates AT INGEST — the ingest command folds its period
      # (incremental_consensus) as its final step. The TRUNCATE-and-replay
      # rebuild was removed by design (backfill/drain is forbidden); this job
      # VERIFIES the fold happened rather than re-materializing anything.
      - name: verify consensus materialized by the ingest period fold
        run: |
          PSQL=(psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -tAc)
          cn=$("${PSQL[@]}" "SELECT count(*) FROM laplace.consensus;")
          fresh=$("${PSQL[@]}" "SELECT count(*) FROM laplace.consensus WHERE last_observed_at > now() - interval '1 day';")
          echo "consensus rows = $cn (touched this period: $fresh)"
          [ "${cn:-0}" -gt 0 ]    || { echo "::error::consensus empty — the ingest's per-period fold did not run"; exit 1; }
          [ "${fresh:-0}" -gt 0 ] || { echo "::error::no consensus rows touched this period — fold did not cover the model ingest"; exit 1; }

  query:
    name: "query — ranked-μ SQL inference over consensus (no GPU)"
    needs: consensus
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - name: ranked-μ query
        run: |
          PSQL=(psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -tAc)
          cn=$("${PSQL[@]}" "SELECT count(*) FROM laplace.consensus;")
          echo "consensus rows = $cn"
          [ "${cn:-0}" -gt 0 ] || { echo "::error::consensus empty after ingest (accumulate-at-ingest produced no rows)"; exit 1; }
          # Top-μ neighbours of the busiest (subject,kind) — relatedness as a sorted index scan.
          q="WITH busiest AS (SELECT subject_id,kind_id FROM laplace.consensus WHERE object_id IS NOT NULL GROUP BY subject_id,kind_id ORDER BY count(*) DESC LIMIT 1) SELECT encode(c.object_id,'hex') AS object, round(((c.rating-2*c.rd)/1e9)::numeric,3) AS eff_mu, c.witness_count FROM laplace.consensus c JOIN busiest b USING (subject_id,kind_id) WHERE c.object_id IS NOT NULL ORDER BY eff_mu DESC LIMIT 10"
          psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -c "$q"
          rows=$("${PSQL[@]}" "SELECT count(*) FROM ($q) s;")
          [ "${rows:-0}" -gt 0 ] || { echo "::error::ranked-μ query returned no rows"; exit 1; }
          echo "::notice::ranked-μ query OK — $rows ranked objects for the busiest relation"

  synthesize:
    name: "synthesize — substrate → GGUF (model recipe)"
    needs: query
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: synthesize
        run: |
          rm -f "$GGUF_OUT"
          out="$($CLI synthesize substrate "$MODEL_DIR/config.json" "$GGUF_OUT" 2>&1)"; echo "$out"
          echo "$out" | grep -qiE 'synthesis complete' || { echo "::error::synthesize did not complete"; exit 1; }
          echo "$out" | grep -qi  'spectral token basis' || { echo "::error::eigenmaps did not run (TokenBasis null)"; exit 1; }
          echo "$out" | grep -qi  'procrustes residual'  || { echo "::error::Procrustes alignment did not run"; exit 1; }

  gguf-verify:
    name: "verify — GGUF valid + non-trivial"
    needs: synthesize
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - name: verify GGUF
        run: |
          [ -f "$GGUF_OUT" ] || { echo "::error::GGUF missing: $GGUF_OUT"; exit 1; }
          sz=$(stat -c%s "$GGUF_OUT")
          [ "$sz" -gt 50000000 ] || { echo "::error::GGUF too small ($sz bytes) — synthesis produced trivial output"; exit 1; }
          echo "::notice::GGUF OK — $((sz/1048576)) MB at $GGUF_OUT"
