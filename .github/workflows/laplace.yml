name: Laplace — build, deploy, test

# One sequenced, idempotent pipeline. Every stage is a no-op on a healthy,
# up-to-date system; every stage gates the next. CI is an orchestrator only —
# the operations live in scripts/pipeline.sh (one phase per job) so the
# Actions graph maps 1:1 onto pipeline phases.
#
#   policy ─┐
#           ├─> build -> unit-test -> deploy -> db-ops -> integration-test
#   deps ───┘                                                    │
#                              restore-api <── smoke <── publish <── seed
#
# Seed precedes publish: seeding writes to PG through the CLI (no API
# dependency), and publish gates on /health/ready — which requires a seeded
# substrate. This order keeps that gate valid on the fresh_db path too.

on:
  # Main only — PRs must not burn the self-hosted runner. Manual re-runs via
  # workflow_dispatch. Merge-to-main is the gate.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_clean:
        description: "wipe build/ before building (same as --force-rebuild)"
        type: boolean
        default: false
      force_codegen:
        description: "ignore attestation-law stamp; always regenerate"
        type: boolean
        default: false
      fresh_db:
        description: "nuke + re-migrate + force-reseed foundation (destructive schema changes only)"
        type: boolean
        default: false
      serial_tests:
        description: "force serial ctest/regress (LAPLACE_TEST_SERIAL=1)"
        type: boolean
        default: false
      force_all:
        description: "ignore content-fingerprint stamps — run every phase/test even when its inputs are unchanged"
        type: boolean
        default: false

concurrency:
  group: laplace-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LAPLACE_EXTERNAL:       ${{ vars.LAPLACE_EXTERNAL       || '/opt/laplace/external' }}
  LAPLACE_INSTALL_PREFIX: ${{ vars.LAPLACE_INSTALL_PREFIX || '/opt/laplace' }}
  # Build against the SAME from-source postgres the postmaster runs — never
  # the apt-packaged headers (packaged PG is being removed from the host).
  LAPLACE_PG_PREFIX:      ${{ vars.LAPLACE_PG_PREFIX      || '/opt/laplace/pgsql-18' }}
  PGDATABASE: laplace
  LAPLACE_DATA_ROOT: /vault/Data
  # Change-aware skipping (scripts/lib/fp.sh): phases/tests whose input content
  # is unchanged since their last SUCCESS no-op. force_all bypasses every gate.
  LAPLACE_FORCE_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.force_all && '1' || '' }}

jobs:

  policy:
    name: Policy — manifest, attestation, vocabulary
    # Self-hosted (was ubuntu-latest): it was the ONLY GitHub-hosted job, and `build` needs it.
    # When the account's hosted-minutes/spending-limit blocks hosted jobs, GitHub refuses to
    # schedule the whole run (0 jobs, indefinitely pending) even though every other job is
    # self-hosted. These checks are pure python/bash/git (validate-pipeline, regenerate+verify
    # deterministic, banned-terms) — safe on the self-hosted runner, which already runs `deps`.
    runs-on: [self-hosted, laplace]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: CI presence tripwire
        # Guards against a repo-hygiene commit sweeping the CI definition away
        # again (commit 0b5d1df deleted every workflow + composite action and
        # CI silently stopped triggering).
        run: |
          fail=0
          for f in \
            .github/workflows/laplace.yml \
            .github/workflows/_ingest.yml \
            .github/workflows/seed-foundation.yml \
            .github/workflows/seed-knowledge.yml \
            .github/workflows/seed-documents.yml \
            .github/workflows/seed-chess.yml \
            .github/workflows/seed-code.yml \
            .github/workflows/seed-models.yml \
            .github/actions/setup-laplace-env/action.yml \
            scripts/pipeline.sh \
            scripts/test-parallel.sh \
            scripts/lib/fp.sh \
            scripts/affected-app.py \
            scripts/setup-host.sh \
            scripts/bootstrap-laplace-runner.sh \
            scripts/ingest-source.sh \
            scripts/ensure-foundation.sh; do
            [ -f "$f" ] || { echo "::error file=$f::CI-critical file missing"; fail=1; }
          done
          exit "$fail"

      - name: Validate witness-manifest vs orchestration scripts
        run: python3 scripts/validate-pipeline.py

      - name: Regenerate attestation law + verify deterministic
        run: |
          set -euo pipefail
          # Codegen outputs are gitignored (CMake regenerates them every build), so a
          # `git diff` here guards nothing — every listed file is untracked. The real
          # invariant is that codegen is a DETERMINISTIC function of the manifest TOML;
          # non-determinism breaks the content-addressed rock. Regenerate, snapshot,
          # wipe, regenerate from clean, and require byte-identical output.
          outs=(
            engine/core/src/generated/relation_law.c
            engine/core/src/generated/pos_law.c
            engine/core/include/laplace/core/relation_law.h
            engine/core/include/laplace/core/pos_law.h
            engine/core/include/laplace/core/highway_manifest.h
            extension/laplace_substrate/sql/generated/seed_relation_types.sql.in
            extension/laplace_substrate/sql/generated/seed_pos.sql.in
          )
          python3 scripts/codegen-attestation-law.py
          for f in "${outs[@]}"; do
            [ -f "$f" ] || { echo "::error file=$f::codegen did not produce a declared output"; exit 1; }
          done
          a=$(cat "${outs[@]}" | sha256sum | cut -d' ' -f1)
          # Wipe only the OUTPUTS, never the codegen stamp: the python codegen
          # doesn't read the stamp, the stamp keys on manifest/script mtimes
          # (untouched here), and the regen below restores byte-identical
          # outputs — deleting the stamp on this shared self-hosted workspace
          # forced the build job's phase_codegen to re-run on every push.
          rm -f "${outs[@]}"
          python3 scripts/codegen-attestation-law.py
          b=$(cat "${outs[@]}" | sha256sum | cut -d' ' -f1)
          [ "$a" = "$b" ] || { echo "::error::codegen NON-DETERMINISTIC ($a != $b) — same TOML, different output; breaks content-addressing"; exit 1; }
          echo "codegen deterministic across a clean regen: $a"

      - name: Forbid C# attestation policy in decomposers
        run: |
          set -e
          violations=0
          files=$(find app \( -path 'app/Laplace.Decomposers/*.cs' -o -path 'app/Laplace.Decomposers/*/*.cs' -o -path 'app/Laplace.Substrate/Abstractions/*.cs' \) \
            ! -path 'app/Laplace.Decomposers.Tests/*')
          for pattern in AttestationFactory 'RelationTypeRegistry\.Attest' 'ScoreFp1e9\s*=' 'AttestationOutcome\.(Confirm|Refute|Draw)'; do
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              echo "::error file=$f::Forbidden attestation policy: $pattern"
              violations=$((violations+1))
            done < <(rg -l "$pattern" $files 2>/dev/null || true)
          done
          exit "$violations"

      - name: Scan for unflagged banned terms
        run: |
          set +e
          banned_terms=(
            "HNSWLib" "hnswlib" "FAISS" "ScaNN" "Milvus" "Pinecone"
            "oneDNN" "cuDNN"
          )
          files_to_scan=$(find . -type f \( -name '*.md' -o -name '*.h' -o -name '*.hpp' -o -name '*.cpp' -o -name '*.c' -o -name '*.cs' -o -name '*.sql' \) \
            ! -path './.git/*' ! -path './node_modules/*' ! -path './.github/archive/*')
          violations=0
          for term in "${banned_terms[@]}"; do
            while IFS= read -r match; do
              file=$(echo "$match" | cut -d: -f1)
              case "$file" in
                ./CLAUDE.md|./.claude/agents/conventional-ai-skeptic.md)
                  ;;
                *)
                  echo "::warning file=$file::Banned term '$term' appears outside allowed files"
                  violations=$((violations+1))
                  ;;
              esac
            done < <(grep -nH "$term" $files_to_scan 2>/dev/null)
          done
          echo "Total unflagged banned-term occurrences: $violations"
          exit "$violations"

  deps:
    name: Runner capabilities + system deps (no-op when current)
    runs-on: [self-hosted, laplace]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }

      - name: Guard — workspace must stay submodule-free
        run: |
          fail=0
          if [ -d .git/modules ] && [ -n "$(ls -A .git/modules 2>/dev/null)" ]; then
            echo "::error::.git/modules is populated — deps must source from \$LAPLACE_EXTERNAL"
            fail=1
          fi
          init=$(git submodule status 2>/dev/null | grep -cE '^[ +U]' || true)
          if [ "${init:-0}" -gt 0 ]; then
            echo "::error::$init submodule(s) initialized in workspace"
            fail=1
          fi
          [ "$fail" -eq 0 ] && echo "workspace submodule-free"
          exit "$fail"

      - name: Toolchain probes
        run: |
          [ -d /opt/intel/oneapi ] || { echo "::error::oneAPI missing"; exit 1; }
          command -v python3 >/dev/null || { echo "::error::python3 missing"; exit 1; }
          "$LAPLACE_PG_PREFIX/bin/pg_config" --version >/dev/null || { echo "::error::pg_config not found at $LAPLACE_PG_PREFIX"; exit 1; }
          command -v dotnet >/dev/null || { echo "::error::dotnet not found"; exit 1; }
          command -v bash >/dev/null || { echo "::error::bash not found"; exit 1; }
          RESULT=$(psql -d postgres -U laplace_admin -tAc "SELECT current_user || ' on ' || current_database();")
          [ "$RESULT" = "laplace_admin on postgres" ] || { echo "::error::peer auth failed: $RESULT"; exit 1; }
          UCD_ZIP="${LAPLACE_DATA_ROOT:-/vault/Data}/UCD/Public/UCD/latest/ucdxml/ucd.nounihan.flat.zip"
          [ -f "$UCD_ZIP" ] || { echo "::error::UCD zip missing: $UCD_ZIP"; exit 1; }

      - name: Sync /opt/laplace/external to .gitmodules pins
        run: |
          for d in tree-sitter geos proj gdal pgsql-18 include lib share bin; do
            mkdir -p "/opt/laplace/$d"
          done
          scripts/sync-external.sh

      - name: Build system deps (fingerprinted — skip unless pins change)
        run: |
          # Stamp + installs live under /opt/laplace; LAPLACE_FORCE_DEPS=1 to rebuild.
          umask 0002
          bash scripts/build-system-deps.sh

      - name: Verify installed dep artifacts
        run: |
          miss=0
          for f in \
            /opt/laplace/proj/lib/libproj.so \
            /opt/laplace/geos/lib/libgeos_c.so \
            /opt/laplace/gdal/lib/libgdal.so \
            /opt/laplace/pgsql-18/bin/postgres \
            /opt/laplace/pgsql-18/lib/postgis-3.so \
            /opt/laplace/tree-sitter/lib/libtree-sitter.a; do
            if [ -e "$f" ]; then echo "  ok $f"; else echo "::error::missing artifact: $f"; miss=1; fi
          done
          exit "$miss"

  build:
    name: Build — engine, extensions, app, perfcache
    needs: [policy, deps]
    runs-on: [self-hosted, laplace]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env

      - name: Clean build tree (dispatch full_clean only)
        if: github.event_name == 'workflow_dispatch' && inputs.full_clean
        run: |
          # checkout is clean:false, so the persistent runner accumulates untracked cruft.
          # Purge stale codegen output from prior builds (old generated/NN_*.sql.in linger and
          # trip the manifest-completeness gate on a fresh configure); pipeline.sh clean then
          # wipes build/ so the native engine (content_witness_batch.c etc.) truly recompiles.
          find extension/laplace_substrate/sql/generated -name '[0-9]*_*.sql.in' -delete 2>/dev/null || true
          bash scripts/pipeline.sh clean

      - name: Build
        run: |
          args=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full_clean }}" = "true" ]; then
            args+=(--force-rebuild)
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_codegen }}" = "true" ]; then
            args+=(--force-codegen)
          fi
          bash scripts/pipeline.sh "${args[@]}" build

  unit-test:
    name: Unit tests — native engine (ctest, excludes pg_regress)
    needs: build
    runs-on: [self-hosted, laplace]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: ctest
        env:
          LAPLACE_TEST_SERIAL: ${{ github.event_name == 'workflow_dispatch' && inputs.serial_tests == true && '1' || '' }}
        run: |
          chmod +x scripts/test-parallel.sh
          if [ "${LAPLACE_TEST_SERIAL:-}" = "1" ]; then
            bash scripts/test-parallel.sh --serial --engine
          else
            bash scripts/test-parallel.sh --engine
          fi

  deploy:
    name: Deploy — stage install to /opt/laplace
    needs: unit-test
    runs-on: [self-hosted, laplace]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env

      - name: Install
        # pipeline.sh install owns the API stop/start around the install window
        # — a fingerprint-skipped install never bounces the service at all.
        run: bash scripts/pipeline.sh install

  db-ops:
    name: DB — migrate, extension sync, perfcache GUC
    needs: deploy
    runs-on: [self-hosted, laplace]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env

      - name: Migrate + sync extension + tune + perfcache GUC + API env
        run: |
          args=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.fresh_db }}" = "true" ]; then
            args+=(--fresh-db)
          fi
          bash scripts/pipeline.sh "${args[@]}" migrate sync-extension tune-pg tune-laplace perfcache-guc api-env

  integration-test:
    name: Integration tests — pg_regress || dotnet (parallel)
    needs: db-ops
    runs-on: [self-hosted, laplace]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env

      - name: Clear stale regress output (diffs below must be from THIS run)
        run: rm -rf build/extension/*/tests/regress_output

      - name: pg_regress || dotnet test (parallel, change-aware)
        env:
          LAPLACE_TEST_SERIAL: ${{ github.event_name == 'workflow_dispatch' && inputs.serial_tests == true && '1' || '' }}
        run: |
          chmod +x scripts/test-parallel.sh
          bin=$(find "${LAPLACE_INSTALL_PREFIX:-/opt/laplace}/share/laplace" "$GITHUB_WORKSPACE/build" \
            -name 'laplace_t0_perfcache*.bin' 2>/dev/null | sort -V | tail -1)
          test -n "$bin" || { echo "::error::perfcache blob not found for dotnet tests"; exit 1; }
          # regress ∥ dotnet-affected (engine gtests already ran in unit-test)
          if [ "${LAPLACE_TEST_SERIAL:-}" = "1" ]; then
            bash scripts/test-parallel.sh --serial --integration
          else
            bash scripts/test-parallel.sh --integration
          fi

      - name: Show regress diffs on failure
        if: failure()
        run: |
          for f in build/extension/*/tests/regress_output/regression.diffs; do
            [ -f "$f" ] || continue
            echo "::group::$f"
            cat "$f"
            echo "::endgroup::"
          done

  seed:
    name: Seed — foundation ladder (idempotent, no-op when present)
    needs: integration-test
    runs-on: [self-hosted, laplace]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env

      - name: Ensure foundation
        run: |
          args=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.fresh_db }}" = "true" ]; then
            args+=(--force)
          fi
          bash scripts/pipeline.sh "${args[@]}" foundation

  publish:
    name: Publish — API + SPA, restart service
    needs: seed
    runs-on: [self-hosted, laplace]
    timeout-minutes: 20
    # Runtime credentials: repository Secrets (encrypted), not machine secrets.env.
    # Non-secret knobs stay in vars / workflow env above.
    env:
      LICHESS_API: ${{ secrets.LICHESS_API }}
      STRIPE_API_SECRET: ${{ secrets.STRIPE_API_SECRET }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_API_Publishable: ${{ vars.STRIPE_API_PUBLISHABLE }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env

      - name: Publish (API + SPA + uci + chess-lab + secrets)
        run: bash scripts/pipeline.sh publish

      - name: Restart API + readiness gate
        # Gate on /health/ready, not /health: /health is liveness only (a
        # hard-coded "ok" that proves the process started). Readiness proves
        # the service can reach the substrate AND the T0 perfcache is loaded
        # in PG — exactly the states whose absence previously sailed through
        # this gate and surfaced four jobs later as a smoke 503.
        #
        # Change-aware: when pipeline.sh publish skipped the deploy (publish
        # domain unchanged) and the service is already active, don't bounce a
        # live service that runs the same bits — still prove readiness. The
        # publish stamp is recorded ONLY here, after readiness passes, so
        # "published" means deployed AND restarted AND ready.
        run: |
          action=$(cat build/.publish-action 2>/dev/null || echo deployed)
          if [[ "$action" == "skipped" ]] && systemctl is-active --quiet laplace-api; then
            echo "publish skipped (domain unchanged) — service active; verifying readiness without restart"
          else
            sudo systemctl restart laplace-api
          fi
          for i in $(seq 1 30); do
            sleep 2
            if curl -fsS http://127.0.0.1:5187/health/ready >/dev/null 2>&1; then
              echo "laplace-api ready"
              bash scripts/pipeline.sh publish-stamp
              exit 0
            fi
          done
          echo "::error::laplace-api not ready 60s after restart — readiness detail:"
          curl -sS http://127.0.0.1:5187/health/ready || true
          echo
          # journalctl needs no root when the runner is in systemd-journal;
          # sudo -n (never prompts) systemctl status is the granted fallback.
          journalctl -u laplace-api -n 40 --no-pager 2>/dev/null \
            || sudo -n systemctl status laplace-api || true
          exit 1

  smoke:
    name: Smoke — live endpoint + substrate counts
    needs: publish
    runs-on: [self-hosted, laplace]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env

      - name: Live endpoint smoke
        run: |
          curl -fsS http://127.0.0.1:5187/v1/capabilities | grep -q '"chat_completions"'
          curl -fsS http://127.0.0.1:5187/health/ready
          echo
          psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 \
            -c "SELECT metric, value FROM laplace.substrate_counts();"
          curl -fsS -X POST http://127.0.0.1:5187/v1/chat/completions \
            -H 'Content-Type: application/json' -H 'X-Laplace-Tenant: ci' \
            --data '{"model":"laplace-converse-001","messages":[{"role":"user","content":"dog"}]}'
          echo

      - name: Endpoint contract tests against the live service
        run: |
          cd app
          dotnet test Laplace.slnx -c Release --no-build --nologo --verbosity minimal \
            --filter 'Tier!=perf & FullyQualifiedName~Endpoints.OpenAICompat'

  restore-api:
    name: Restore API (always — even after failed stages)
    if: always() && needs.deploy.result != 'skipped'
    needs: [deploy, publish, seed, smoke]
    runs-on: [self-hosted, laplace]
    timeout-minutes: 10
    steps:
      - name: Ensure API is running
        run: |
          sudo systemctl start laplace-api || true
          sleep 3
          curl -fsS http://127.0.0.1:5187/health | grep -q '"status":"ok"' || {
            echo "::warning::laplace-api unhealthy after restore"
            journalctl -u laplace-api -n 40 --no-pager 2>/dev/null \
              || sudo -n systemctl status laplace-api || true
            exit 1
          }
