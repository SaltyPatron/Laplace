name: CI — docs + alignment checks

# GitHub-hosted runners (free for public repos).
# Safe for PR validation: runs on disposable VMs; untrusted code can't escape.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  required-files:
    name: Required project files present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required documentation files
        run: |
          set -e
          required=(
            CLAUDE.md
            AGENTS.md
            README.md
            GLOSSARY.md
            RULES.md
            STANDARDS.md
            DESIGN.md
            OPERATIONS.md
            Justfile
            .github/copilot-instructions.md
            .claude/settings.json
            .claude/agents/substrate-architect.md
            .claude/agents/postgres-extension.md
            .claude/agents/cpp-performance.md
            .claude/agents/type-taxonomy.md
            .claude/agents/ingestion-pipeline.md
            .claude/agents/verification.md
            .claude/agents/conventional-ai-skeptic.md
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::Required file is missing"
              missing=$((missing+1))
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "::error::$missing required file(s) missing"
            exit 1
          fi
          echo "All required project files present."

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint (advisory)
        # advisory: doesn't fail CI yet — adopt a strict ruleset later
        continue-on-error: true
        run: markdownlint --disable MD013 MD024 MD033 MD034 MD036 MD041 -- '**/*.md' '!node_modules/**' || true

  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links in markdown
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
        continue-on-error: true

  anti-vocabulary-scan:
    name: Banned conventional-AI vocabulary scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for unflagged banned terms
        # The GLOSSARY.md anti-vocabulary section IS allowed to mention banned terms.
        # Other files should not mention them except as explicit rejection.
        # This is advisory for now — refine the allowlist mechanism as needed.
        run: |
          set +e
          banned_terms=(
            "HNSWLib" "hnswlib" "FAISS" "ScaNN" "Milvus" "Pinecone"
            "oneDNN" "cuDNN"
          )
          files_to_scan=$(find . -type f \( -name '*.md' -o -name '*.h' -o -name '*.hpp' -o -name '*.cpp' -o -name '*.c' -o -name '*.cs' -o -name '*.sql' \) \
            ! -path './.git/*' ! -path './node_modules/*')
          violations=0
          for term in "${banned_terms[@]}"; do
            while IFS= read -r match; do
              file=$(echo "$match" | cut -d: -f1)
              # Allow mentions in GLOSSARY.md (anti-vocabulary), RULES.md, the conventional-ai-skeptic agent, and this workflow file
              case "$file" in
                  ;;
                *)
                  echo "::warning file=$file::Banned term '$term' appears outside allowed files"
                  violations=$((violations+1))
                  ;;
              esac
            done < <(grep -nH "$term" $files_to_scan 2>/dev/null)
          done
          echo "Total unflagged banned-term occurrences: $violations"
          # Advisory for now — flip to `exit $violations` once allowlist is mature
