name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build + Test (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 3.30.x

      - name: Cache vcpkg / FetchContent
        uses: actions/cache@v4
        with:
          path: |
            ext/laplace_pg/build/_deps
            ~/.nuget/packages
          key: ${{ runner.os }}-buildcache-${{ hashFiles('CMakeLists.txt', '**/*.csproj', 'Directory.Build.props') }}

      - name: Build
        run: ./scripts/build.ps1 -Configuration Release
        shell: pwsh

      - name: Test
        run: ./scripts/test.ps1 -Configuration Release -Suite all
        shell: pwsh

  build-windows-asan:
    name: Build + Test under AddressSanitizer (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 3.30.x

      - name: Build with ASan
        run: ./scripts/build.ps1 -Configuration Debug -Asan
        shell: pwsh

      - name: Native tests under ASan
        run: ./scripts/test.ps1 -Configuration Debug -Suite native
        shell: pwsh
