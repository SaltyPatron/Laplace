name: Integration — self-hosted (oneAPI + Postgres + Laplace)

# Self-hosted runner with oneAPI, PG 18, .NET 10 access.
# SECURITY: triggers ONLY on push to main + workflow_dispatch.
# DO NOT add `pull_request` triggers — untrusted PR code must NEVER run on the self-hosted runner.
# PR validation is handled by ci.yml on GitHub-hosted disposable VMs.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capabilities:
    name: Verify self-hosted runner capabilities
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init submodules (non-recursive — tree-sitter-nqc/examples/nqc has no URL)
        run: git submodule update --init

      - name: System info
        run: |
          echo "::group::OS / kernel"
          uname -a
          cat /etc/os-release | grep -E '^(NAME|VERSION)='
          echo "::endgroup::"
          echo "::group::CPU + AVX support"
          lscpu | grep -E 'Model name|Architecture|^CPU\(s\):'
          grep -oE 'avx[a-z0-9_]*' /proc/cpuinfo | sort -u
          echo "::endgroup::"
          echo "::group::Memory"
          free -h | head -3
          echo "::endgroup::"

      - name: Intel oneAPI present
        run: |
          if [ -d /opt/intel/oneapi ]; then
            echo "✓ oneAPI installed at /opt/intel/oneapi"
            ls /opt/intel/oneapi/compiler/latest/bin/ | head -10
          else
            echo "::error::Intel oneAPI not found at /opt/intel/oneapi"
            exit 1
          fi

      - name: PostgreSQL + PostGIS (stock host PG)
        run: |
          if command -v pg_config >/dev/null 2>&1; then
            pg_config --version
            pg_config --includedir-server
          else
            echo "::error::pg_config not found"
            exit 1
          fi

      - name: .NET SDK
        run: |
          if command -v dotnet >/dev/null 2>&1; then
            dotnet --version
            dotnet --list-sdks
          else
            echo "::error::dotnet not found"
            exit 1
          fi

      - name: Submodule presence (sanity)
        run: |
          for dep in eigen spectra blake3 googletest postgresql postgis proj geos gdal tree-sitter; do
            if [ -d "external/$dep" ] && [ -n "$(ls external/$dep 2>/dev/null)" ]; then
              echo "✓ external/$dep present"
            else
              echo "::error::external/$dep submodule missing"
              exit 1
            fi
          done

      - name: Peer auth (laplace-runner → laplace_admin) per ADR 0019
        run: |
          RESULT=$(psql -d postgres -U laplace_admin -tAc "SELECT current_user || ' on ' || current_database();")
          echo "Peer-auth probe: $RESULT"
          if [ "$RESULT" != "laplace_admin on postgres" ]; then
            echo "::error::Expected 'laplace_admin on postgres', got '$RESULT'"
            echo "::error::Run: scripts/setup-host.sh   (idempotent; full Layer 0+1 setup)"
            exit 1
          fi

  build:
    name: Build engine + extensions + app (top-level CMake per ADR 0032)
    needs: capabilities
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init submodules (non-recursive — tree-sitter-nqc/examples/nqc has no URL)
        run: git submodule update --init

      - name: Build system deps (unified ExternalProject pipeline)
        run: |
          # Per ADR 0038 — gcc toolchain for the system dep chain.
          # Stamp-based: re-runs with unchanged submodule SHAs are no-ops.
          cmake -B build/deps -S external
          cmake --build build/deps -j

      - name: cmake configure (engine + extensions; intel toolchain)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/intel-oneapi.cmake \
            -DLAPLACE_PG_PREFIX=/usr/lib/postgresql/18

      - name: cmake build (engine + extensions + SQLPP preprocessing)
        run: |
          cmake --build build

      - name: ctest (engine C++ unit tests via GoogleTest)
        run: |
          cd build
          ctest --output-on-failure

      - name: Verify SQL artifacts produced
        run: |
          for ext in laplace_geom laplace_substrate; do
            sql="build/extension/${ext}/${ext}--0.1.0.sql"
            ctl="build/extension/${ext}/${ext}.control"
            so="build/extension/${ext}/${ext}.so"
            for f in "$sql" "$ctl" "$so"; do
              [ -f "$f" ] || { echo "::error::Missing build artifact: $f"; exit 1; }
            done
            echo "✓ $ext artifacts produced (.so, .control, .sql)"
          done

      - name: Build C# app + tests
        run: |
          cd app
          dotnet build Laplace.slnx -c Release

  # Layer 1 — install extensions, then DbUp orchestrates EnsureDatabase
  # + CREATE EXTENSION (laplace_geom + laplace_substrate) + role grants.
  db-deploy:
    name: Install extensions + apply DbUp migrations (Layer 1)
    needs: build
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init submodules (non-recursive — tree-sitter-nqc/examples/nqc has no URL)
        run: git submodule update --init

      - name: cmake configure + build (intel toolchain; deps re-used from build job)
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/intel-oneapi.cmake \
            -DLAPLACE_PG_PREFIX=/usr/lib/postgresql/18
          cmake --build build

      - name: cmake install (bounded sudo, per ADR 0019)
        run: |
          sudo cmake --install build

      - name: DbUp — EnsureDatabase('laplace') + apply migrations
        run: |
          cd app
          dotnet run --project Laplace.Migrations/Laplace.Migrations.csproj -c Release -- up

      - name: Verify both extensions installed
        run: |
          psql -d laplace -U laplace_admin -c "\dx" -P "footer=off"
          for ext in postgis laplace_geom laplace_substrate; do
            if ! psql -d laplace -U laplace_admin -tAc \
                "SELECT 1 FROM pg_extension WHERE extname='$ext';" | grep -q 1; then
              echo "::error::Extension '$ext' not present"
              exit 1
            fi
          done

      - name: Smoke — version functions report 0.1.0
        run: |
          GEOM=$(psql -tA -d laplace -U laplace_admin -c "SELECT laplace_geom_version();")
          SUB=$(psql  -tA -d laplace -U laplace_admin -c "SELECT laplace_substrate_version();")
          echo "laplace_geom_version()      → '$GEOM'"
          echo "laplace_substrate_version() → '$SUB'"
          if [ "$GEOM" != "0.1.0" ] || [ "$SUB" != "0.1.0" ]; then
            echo "::error::Version mismatch — expected '0.1.0' from both"
            exit 1
          fi
          echo "::notice::Both substrate extensions report 0.1.0; engine link chain verified"

      - name: DbUp status
        run: |
          cd app
          dotnet run --project Laplace.Migrations/Laplace.Migrations.csproj -c Release -- status

      - name: Role grants in place
        run: |
          psql -d laplace -U laplace_admin -tAc "
            SELECT has_schema_privilege('laplace_app', 'laplace', 'USAGE'),
                   has_schema_privilege('laplace_readonly', 'laplace', 'USAGE');
          " | sed 's/^/  /'

  # Per B′.9 #196 — pg_regress smoke tests for both extensions against
  # the deployed staged-extension install. Drops + recreates per-extension
  # test DBs (laplace_regress_geom, laplace_regress_substrate) as
  # laplace_admin (peer auth — runner is laplace-runner), runs pg_regress,
  # diffs vs extension/<name>/tests/expected/*.out. Independent of the
  # production `laplace` DB.
  regress:
    name: pg_regress smoke (laplace_geom + laplace_substrate)
    needs: db-deploy
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init submodules (non-recursive — tree-sitter-nqc/examples/nqc has no URL)
        run: git submodule update --init

      - name: cmake configure + build (re-uses /opt/laplace deps + install)
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/intel-oneapi.cmake \
            -DLAPLACE_PG_PREFIX=/usr/lib/postgresql/18
          LD_LIBRARY_PATH="$(pwd)/build/engine/core:$(pwd)/build/engine/dynamics:$(pwd)/build/engine/synthesis:${LD_LIBRARY_PATH:-}" \
            cmake --build build

      - name: ctest -L regress (pg_regress fixtures + tests)
        run: |
          cd build
          ctest --output-on-failure -L regress

      - name: Show regress diffs on failure
        if: failure()
        run: |
          for f in build/extension/*/tests/regress_output/regression.diffs; do
            [ -f "$f" ] || continue
            echo "::group::$f"
            cat "$f"
            echo "::endgroup::"
          done

  # - test-app (dotnet test with Testcontainers — Chunk 1+; once Docker
  #   daemon access is granted to laplace-runner)
  # - verify-determinism, verify-fk, verify-perfcache (Chunk 3+)
  # - round-trip end-to-end test (Chunk 8)
