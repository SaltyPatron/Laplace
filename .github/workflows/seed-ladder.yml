name: Seed ladder (reusable)

# Ingest the seed sources ONE AT A TIME, in dependency order — each
# source is its OWN JOB chained by `needs:`, not a step inside one monolith:
#   - per-source pass/fail status at the job level (one stage dying does not
#     paint every other source red);
#   - "Re-run failed jobs" RESUMES the ladder at the failed source — completed
#     sources are not replayed (their jobs already succeeded);
#   - the strict one-at-a-time order is enforced by the dependency graph (and
# defended in depth by the substrate's own layer gate), not by
#     step position inside a script.
# OMW lands right after WordNet (the synset scaffold it maps onto) and BEFORE
# ud/the big corpora, so those witness onto OMW's multilingual lexemes instead
# of racing to create them. Runs on the SAME `laplace` DB the model pipeline
# then extends — NO nuke between stages (the one clean slate is db-deploy), so
# seed + model witnesses coexist for consensus. Bounded set always; multi-hour
# corpora only when full_ladder=true. Called by integration.yml.
on:
  workflow_call:
    inputs:
      full_ladder:
        description: "Also ingest the multi-hour corpora (tatoeba/conceptnet/wiktionary/atomic2020)"
        type: boolean
        default: false

permissions:
  contents: read

# Throughput knobs (read by BuildIngestOptions / ConsensusAccumulatingWriter —
# the same env conventions as LAPLACE_DB). Defaults are sized for a dev box;
# CI owns the whole 6-core runner, so say so explicitly:
#   LAPLACE_INGEST_WORKERS — concurrent batch appliers (safe: TEMP-staged
#       COPY + ON CONFLICT converge overlapping novel ids)
#   LAPLACE_FOLD_WORKERS   — staging partitions = concurrent period-fold
#       sessions (disjoint by relation identity)
env:
  LAPLACE_INGEST_WORKERS: 4
  LAPLACE_FOLD_WORKERS: 4

jobs:
  unicode:
    name: "unicode (layer 0 · sets layer marker)"
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      # Layer 0. Idempotent re-ingest (content-addressing + ON CONFLICT);
      # sets the HasLayerCompleted/0 marker that unblocks iso639. (The legacy
      # marker-less seed-unicode command is deleted — every T0 seed is this.)
      - name: ingest
        run: scripts/ingest-source.sh unicode

  iso639:
    name: "iso639 (layer 1 · languages/scripts reference + graph)"
    needs: unicode
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: ingest
        run: scripts/ingest-source.sh iso639
      - name: "verify — language graph navigable (filter/focus by script & macrolanguage)"
        run: |
          # Substrate operating surface only — no hand-built hash expressions.
          P(){ psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -tAc "$1"; }
          us=$(P "SELECT laplace.evidence_count(p_kind => laplace.kind_id('USES_SCRIPT'));")
          mm=$(P "SELECT laplace.evidence_count(p_kind => laplace.kind_id('MEMBER_OF_MACROLANGUAGE'));")
          latin=$(P "SELECT laplace.evidence_count(p_kind => laplace.kind_id('USES_SCRIPT'), p_object => laplace.canonical_id('unicode/script/Latin/v1'));")
          echo "USES_SCRIPT=$us  MEMBER_OF_MACROLANGUAGE=$mm  languages→Latin=$latin"
          [ "${us:-0}" -gt 0 ]      || { echo "::error::no USES_SCRIPT edges — language↔script graph missing"; exit 1; }
          [ "${mm:-0}" -gt 0 ]      || { echo "::error::no MEMBER_OF_MACROLANGUAGE edges — macrolanguage graph missing"; exit 1; }
          [ "${latin:-0}" -gt 50 ]  || { echo "::error::only $latin languages link to Latin — codepoint→script→language convergence broken"; exit 1; }
          echo "::notice::language graph navigable — $latin languages use Latin; codepoint→script→language→macrolanguage chained, no runtime join"

  wordnet:
    name: "wordnet (layer 2 · English synset scaffold)"
    needs: iso639
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: ingest
        run: scripts/ingest-source.sh wordnet
      # Stage-local gate (was previously at the END of the monolith — a WordNet
      # content regression should fail THIS job, not surface three stages later).
      - name: "verify — WordNet landed CONTENT (kind=1 physicalities), not just attestations"
        run: |
          PSQL=(psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -tAc)
          c=$("${PSQL[@]}" "SELECT laplace.content_count(laplace.source_id('WordNetDecomposer'));")
          a=$("${PSQL[@]}" "SELECT laplace.evidence_count(p_source => laplace.source_id('WordNetDecomposer'));")
          echo "WordNet: CONTENT physicalities=$c  attestations=$a"
          [ "${c:-0}" -gt 0 ] || { echo "::error::WordNet emitted no CONTENT physicalities — content path regressed"; exit 1; }
          [ "${a:-0}" -gt 0 ] || { echo "::error::WordNet emitted no attestations"; exit 1; }

  omw:
    name: "omw (layer 3 · multilingual lexemes onto the synsets)"
    needs: wordnet
    runs-on: [self-hosted, laplace]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: ingest
        run: scripts/ingest-source.sh omw

  ud:
    name: "ud (layer 2 · syntax / UPOS)"
    needs: omw
    runs-on: [self-hosted, laplace]
    timeout-minutes: 240   # measured 1h56m at WORKERS=1 (2026-06-04 run); explicit > the silent 360 default
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: ingest
        run: scripts/ingest-source.sh ud

  # --- big corpora (multi-hour): on demand only, each its own resumable job ---
  tatoeba:
    name: "tatoeba (full ladder · parallel sentences)"
    needs: ud
    if: ${{ inputs.full_ladder }}
    runs-on: [self-hosted, laplace]
    timeout-minutes: 720   # multi-hour corpus; explicit, not the silent 360 default
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: ingest
        run: scripts/ingest-source.sh tatoeba

  conceptnet:
    name: "conceptnet (full ladder · commonsense relations)"
    needs: tatoeba
    if: ${{ inputs.full_ladder }}
    runs-on: [self-hosted, laplace]
    timeout-minutes: 720   # multi-hour corpus; explicit, not the silent 360 default
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: ingest
        run: scripts/ingest-source.sh conceptnet

  wiktionary:
    name: "wiktionary (full ladder · dictionary)"
    needs: conceptnet
    if: ${{ inputs.full_ladder }}
    runs-on: [self-hosted, laplace]
    timeout-minutes: 720   # multi-hour corpus; explicit, not the silent 360 default
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: ingest
        run: scripts/ingest-source.sh wiktionary

  atomic2020:
    name: "atomic2020 (full ladder · inferential)"
    needs: wiktionary
    if: ${{ inputs.full_ladder }}
    runs-on: [self-hosted, laplace]
    timeout-minutes: 720   # multi-hour corpus; explicit, not the silent 360 default
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: ingest
        run: scripts/ingest-source.sh atomic2020

  convergence:
    name: "report — cross-source convergence (entities witnessed by >1 source)"
    # Tail report in BOTH modes: bounded (atomic2020 skipped) and full ladder.
    needs: [ud, atomic2020]
    if: ${{ !cancelled() && needs.ud.result == 'success' && (needs.atomic2020.result == 'success' || needs.atomic2020.result == 'skipped') }}
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - name: report
        run: |
          m=$(psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -tAc \
            "SELECT laplace.multi_source_entity_count();")
          echo "::notice::multi-source entities=$m"
