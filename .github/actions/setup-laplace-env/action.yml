name: Set up Laplace build/runtime env
description: >
  Export the workspace-relative runtime env into $GITHUB_ENV: Intel oneAPI
  toolchain vars (when the runner service was started without them),
  build-tree LD_LIBRARY_PATH for the engine .so files, and PostgreSQL
  connection defaults (peer auth as laplace_admin over the unix socket).

runs:
  using: composite
  steps:
    - name: Export workspace env (+ oneAPI fallback for pre-.env runners)
      shell: bash
      run: |
        if [ -z "${MKLROOT:-}" ]; then
          set +u
          source /opt/intel/oneapi/setvars.sh --force >/dev/null 2>&1
          set -u
          printenv | grep -E '^(ONEAPI_ROOT|CMPLR_ROOT|MKLROOT|TBBROOT|CPATH|LIBRARY_PATH|PKG_CONFIG_PATH|SETVARS_COMPLETED)=' >> "$GITHUB_ENV"
          echo "PATH=$PATH" >> "$GITHUB_ENV"
        fi
        echo "LD_LIBRARY_PATH=$PWD/build/engine/core:$PWD/build/engine/dynamics:$PWD/build/engine/synthesis:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
        echo "PGDATABASE=${PGDATABASE:-laplace}" >> "$GITHUB_ENV"
        echo "LAPLACE_QUERY_DB=${LAPLACE_QUERY_DB:-laplace}" >> "$GITHUB_ENV"
        echo "LAPLACE_DB=${LAPLACE_DB:-Host=/var/run/postgresql;Username=laplace_admin;Database=${PGDATABASE:-laplace}}" >> "$GITHUB_ENV"
        # MSBuild worker nodes and the Roslyn compiler server outlive their
        # jobs on a persistent runner (killed as orphans at cleanup, seen
        # every seed run). Cross-job reuse buys nothing here — disable both
        # so builds stop leaking processes.
        echo "MSBUILDDISABLENODEREUSE=1" >> "$GITHUB_ENV"
        echo "UseSharedCompilation=false" >> "$GITHUB_ENV"
        # Build/test parallelism (parity with scripts/win/env.cmd).
        # Set LAPLACE_TEST_SERIAL=1 on the runner to force serial ctest.
        nproc_n="$(nproc 2>/dev/null || echo 1)"
        if [ -z "${CMAKE_BUILD_PARALLEL_LEVEL:-}" ]; then
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$nproc_n" >> "$GITHUB_ENV"
        fi
        if [ -z "${CTEST_PARALLEL_LEVEL:-}" ]; then
          if [ "${LAPLACE_TEST_SERIAL:-}" = "1" ]; then
            echo "CTEST_PARALLEL_LEVEL=1" >> "$GITHUB_ENV"
          else
            echo "CTEST_PARALLEL_LEVEL=$nproc_n" >> "$GITHUB_ENV"
          fi
        fi
