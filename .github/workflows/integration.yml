name: Integration — self-hosted (oneAPI + Postgres + Laplace)

# Self-hosted runner with oneAPI, PG 18, .NET 10 access.
# SECURITY: triggers ONLY on push to main + workflow_dispatch.
# DO NOT add `pull_request` triggers — untrusted PR code must NEVER run on the self-hosted runner.
# PR validation is handled by ci.yml on GitHub-hosted disposable VMs.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_ladder:
        description: "Decomposer ladder: also ingest the multi-hour corpora (tatoeba/conceptnet/wiktionary/atomic2020); omw + ud always run"
        type: boolean
        default: false

# Serialize integration runs and cancel superseded ones: a new push to main cancels any
# in-flight integration run instead of stacking another ~1.5h run behind it on the single
# self-hosted runner + shared cluster (the force-push pile-up). Safe to cancel — db-deploy
# nukes + re-seeds at the start of every run and ingestion is idempotent by content-
# addressing, so a cancelled half-run leaves nothing a fresh run can't redo.
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# /opt/laplace/external/ is the canonical source for dep checkouts:
# one non-bare working tree per submodule, maintained at the .gitmodules-pinned
# SHA by scripts/sync-external.sh. CMake reads dep sources from it directly
# via -DLAPLACE_EXTERNAL=...  No workspace external/, no .git/modules.
#
# Caching: self-hosted runner persists _work across runs. clean: false on
# every actions/checkout keeps build/deps/* stamp files + build/* CMake
# artifacts intact between workflow runs. ExternalProject stamp-based
# incremental + Ninja stamp-based incremental + dotnet incremental together
# make a no-change re-run effectively no-op per dep.
#
# Repeated logic is modularized out of this orchestrator:
#   .github/actions/setup-laplace-env  — source oneAPI + export build/runtime env
#   .github/actions/build-dep          — configure + build one dep target + verify
#   .github/workflows/seed-ladder.yml  — reusable: ingest each seed source, one step each
#   .github/workflows/model-pipeline.yml — reusable: ingest → consensus → query → synth → GGUF
#
# Job DAG (one concern per job, one dep per job):
#
#   capabilities
#       ├── proj ────┐
#       │            ├── gdal ──┐
#       ├── geos ────┴─────────┤
#       ├── postgresql ────────┴── postgis ──┐
#       ├── tree-sitter ──────────────────────┴── engine ──┐
#       └── dotnet ──────────────────────────────┴── db-deploy ──┬── dotnet-test ──┐
#                              (db-nuke: ONE clean slate here)    └── regress ──────┴── seed-ladder ── model-pipeline
#                                                                        (each stage = a visible step in its module)
env:
  LAPLACE_EXTERNAL:       ${{ vars.LAPLACE_EXTERNAL       || '/opt/laplace/external' }}
  LAPLACE_INSTALL_PREFIX: ${{ vars.LAPLACE_INSTALL_PREFIX || '/opt/laplace' }}
  LAPLACE_PG_PREFIX:      ${{ vars.LAPLACE_PG_PREFIX      || '/usr/lib/postgresql/18' }}

jobs:
  # ------------------------------------------------------------------
  # capabilities — host preflight + idempotent setup (no build work).
  # Ensures /opt/laplace install destinations exist; syncs external/.
  # ------------------------------------------------------------------
  capabilities:
    name: Verify self-hosted runner capabilities
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          clean: false

      - name: Guard — workspace must stay submodule-free (catch the .git/modules bleed)
        run: |
          # Deps come from $LAPLACE_EXTERNAL (/opt/laplace/external), never from
          # workspace submodules. A `submodules: false` checkout must NOT create
          # .git/modules or initialize any submodule. If it did, something
          # re-introduced submodule init (e.g. a `git submodule update --init`
          # step) — the 4.5 GB-per-run _work bleed. Fail loud at step one rather
          # than silently re-downloading 300+ grammar repos every run.
          fail=0
          if [ -d .git/modules ] && [ -n "$(ls -A .git/modules 2>/dev/null)" ]; then
            echo "::error::.git/modules is populated ($(du -sh .git/modules | cut -f1)) — submodule init regressed. Deps must source from \$LAPLACE_EXTERNAL, not workspace submodules."
            fail=1
          fi
          init=$(git submodule status 2>/dev/null | grep -cE '^[ +U]' || true)
          if [ "${init:-0}" -gt 0 ]; then
            echo "::error::$init submodule(s) initialized in workspace — expected 0 under submodules:false + cache."
            git submodule status 2>/dev/null | grep -E '^[ +U]' | head -10
            fail=1
          fi
          [ "$fail" -eq 0 ] && echo "✓ workspace submodule-free; deps sourced from \$LAPLACE_EXTERNAL"
          exit "$fail"

      - name: Ensure /opt/laplace install destinations exist (idempotent)
        run: |
          # Per-dep dirs (system deps land here from `cmake --build build/deps`)
          # + engine dirs (top-level `cmake --install build` lands liblaplace_*.so,
          # headers, PG extension files here). Created by laplace-runner →
          # owned by laplace-runner; setgid + group inherit from /opt/laplace/'s
          # 2775 → mode 2775 group laplace-runner. No sudo, no chown.
          for d in tree-sitter geos proj gdal pgsql-18 include lib share bin; do
            if [ ! -d "/opt/laplace/$d" ]; then
              mkdir -p "/opt/laplace/$d"
              echo "  created /opt/laplace/$d ($(stat -c '%U:%G mode=%a' /opt/laplace/$d))"
            else
              echo "  exists  /opt/laplace/$d ($(stat -c '%U:%G mode=%a' /opt/laplace/$d))"
            fi
          done

      - name: Sync /opt/laplace/external/ to .gitmodules pin (no-op when already at pin)
        run: scripts/sync-external.sh

      - name: System info
        run: |
          echo "::group::OS / kernel"
          uname -a; cat /etc/os-release | grep -E '^(NAME|VERSION)='
          echo "::endgroup::"
          echo "::group::CPU + AVX support"
          lscpu | grep -E 'Model name|Architecture|^CPU\(s\):'
          grep -oE 'avx[a-z0-9_]*' /proc/cpuinfo | sort -u
          echo "::endgroup::"
          echo "::group::Memory"
          free -h | head -3
          echo "::endgroup::"

      - name: Intel oneAPI present
        run: |
          [ -d /opt/intel/oneapi ] || { echo "::error::oneAPI missing"; exit 1; }
          ls /opt/intel/oneapi/compiler/latest/bin/ | head -10

      - name: PostgreSQL host stock pg_config
        run: |
          command -v pg_config >/dev/null || { echo "::error::pg_config not found"; exit 1; }
          pg_config --version

      - name: .NET SDK
        run: |
          command -v dotnet >/dev/null || { echo "::error::dotnet not found"; exit 1; }
          dotnet --version
          dotnet --list-sdks

      - name: External tree present at $LAPLACE_EXTERNAL
        run: |
          for dep in eigen spectra blake3 googletest postgresql postgis proj geos gdal tree-sitter; do
            if [ -d "$LAPLACE_EXTERNAL/$dep/.git" ]; then
              echo "✓ $LAPLACE_EXTERNAL/$dep (HEAD=$(git -c safe.directory='*' -C "$LAPLACE_EXTERNAL/$dep" rev-parse --short HEAD))"
            else
              echo "::error::$LAPLACE_EXTERNAL/$dep missing — sync-external.sh should have created it"
              exit 1
            fi
          done

      - name: Peer auth (laplace-runner → laplace_admin)
        run: |
          RESULT=$(psql -d postgres -U laplace_admin -tAc "SELECT current_user || ' on ' || current_database();")
          [ "$RESULT" = "laplace_admin on postgres" ] || {
            echo "::error::Expected 'laplace_admin on postgres', got '$RESULT'"; exit 1; }
          echo "Peer-auth probe: $RESULT"

  # ------------------------------------------------------------------
  # System dep jobs — one per dep, DAG-ordered. Each job runs
  # `cmake --build build/deps --target <dep>`. ExternalProject stamps
  # in build/deps/<dep>-stamp/ persist across runs (clean: false). A
  # no-change re-run is a no-op for each dep individually.
  #
  # External/CMakeLists.txt configure is idempotent — first dep job
  # configures build/deps; subsequent dep jobs find it configured.
  # ------------------------------------------------------------------
  proj:
    name: dep — proj (CRS / coordinate transforms)
    needs: capabilities
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/build-dep
        with:
          target: proj
          verify: |
            /opt/laplace/proj/lib/libproj.so
            /opt/laplace/proj/include/proj.h

  geos:
    name: dep — geos (geometry engine)
    needs: capabilities
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/build-dep
        with:
          target: geos
          verify: |
            /opt/laplace/geos/lib/libgeos_c.so
            /opt/laplace/geos/include/geos_c.h

  gdal:
    name: dep — gdal (geospatial abstraction; needs proj)
    needs: [capabilities, proj]
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/build-dep
        with:
          target: gdal
          verify: |
            /opt/laplace/gdal/lib/libgdal.so
            /opt/laplace/gdal/include/gdal.h

  postgresql:
    name: dep — postgresql 18
    needs: capabilities
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/build-dep
        with:
          target: postgresql
          verify: |
            /opt/laplace/pgsql-18/bin/postgres
            /opt/laplace/pgsql-18/include/server/postgres.h
            /opt/laplace/pgsql-18/lib/pgxs/src/makefiles/pgxs.mk

  postgis:
    name: dep — postgis 3.6.3 (needs pg + geos + proj + gdal)
    needs: [capabilities, postgresql, geos, proj, gdal]
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/build-dep
        with:
          target: postgis
          verify: |
            /opt/laplace/pgsql-18/lib/postgis-3.so
            /opt/laplace/pgsql-18/share/extension/postgis.control

  tree-sitter:
    name: dep — tree-sitter runtime
    needs: capabilities
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/build-dep
        with:
          target: tree-sitter
          verify: |
            /opt/laplace/tree-sitter/lib/libtree-sitter.a
            /opt/laplace/tree-sitter/include/tree_sitter/api.h

  # ------------------------------------------------------------------
  # engine — C/C++ build of engine libs (core, dynamics, synthesis) +
  # PG extensions (laplace_geom, laplace_substrate). eigen, spectra are
  # header-only (consumed via include paths); blake3, googletest are
  # built as add_subdirectory inside the engine CMakeLists. Intel oneAPI
  # toolchain (icx/icpx) used here for the dynamics path (MKL/SIMD).
  # ------------------------------------------------------------------
  engine:
    name: Build engine + extensions (intel toolchain; ctest; SQL artifact verify)
    needs: [postgis, tree-sitter]
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }

      - uses: ./.github/actions/setup-laplace-env

      - name: cmake configure (intel toolchain; STAGED install for sudo-free /opt/laplace path)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/intel-oneapi.cmake \
            -DCMAKE_INSTALL_PREFIX="$LAPLACE_INSTALL_PREFIX" \
            -DLAPLACE_PG_PREFIX="$LAPLACE_PG_PREFIX" \
            -DLAPLACE_EXTERNAL="$LAPLACE_EXTERNAL" \
            -DLAPLACE_INSTALL_STAGED=ON

      - name: cmake build (ninja incremental)
        run: cmake --build build

      - name: ctest (engine C++ unit tests via GoogleTest; excludes pg_regress)
        run: |
          ctest --test-dir build --output-on-failure -LE regress

      - name: Verify SQL artifacts produced
        run: |
          for ext in laplace_geom laplace_substrate; do
            for f in "build/extension/${ext}/${ext}--0.1.0.sql" \
                     "build/extension/${ext}/${ext}.control" \
                     "build/extension/${ext}/${ext}.so"; do
              [ -f "$f" ] || { echo "::error::Missing build artifact: $f"; exit 1; }
            done
            echo "✓ $ext artifacts produced"
          done

  # ------------------------------------------------------------------
  # dotnet — C# app + test projects. Independent of engine for compile.
  # ------------------------------------------------------------------
  dotnet:
    name: Build C# app + tests (dotnet build Release)
    needs: capabilities
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - name: dotnet build (Release, incremental)
        run: |
          cd app
          dotnet build Laplace.slnx -c Release

  # ------------------------------------------------------------------
  # db-deploy — install engine .so + .control + .sql; run DbUp; verify.
  # ------------------------------------------------------------------
  db-deploy:
    name: Install extensions + apply DbUp migrations (Layer 1)
    needs: [engine, dotnet]
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }

      - uses: ./.github/actions/setup-laplace-env

      - name: cmake --install (no sudo)
        # umask 0002: dirs born group-writable so the developer identity can
        # always pre-wipe/overwrite what CI creates (and vice versa).
        run: umask 0002 && cmake --install build

      - name: Clean slate — db-nuke (ONE per-run reset; seed + model then accrete onto the SAME DB)
        run: |
          cd app
          echo NUKE | dotnet run --project Laplace.Migrations/Laplace.Migrations.csproj -c Release -- nuke

      - name: DbUp — EnsureDatabase('laplace') + apply migrations
        run: |
          cd app
          dotnet run --project Laplace.Migrations/Laplace.Migrations.csproj -c Release -- up

      - name: Verify both extensions installed
        run: |
          psql -d laplace -U laplace_admin -c "\dx" -P "footer=off"
          for ext in postgis laplace_geom laplace_substrate; do
            psql -d laplace -U laplace_admin -tAc \
                "SELECT 1 FROM pg_extension WHERE extname='$ext';" | grep -q 1 \
              || { echo "::error::Extension '$ext' not present"; exit 1; }
          done

      - name: Smoke — version functions report 0.1.0
        run: |
          GEOM=$(psql -tA -d laplace -U laplace_admin -c "SELECT public.laplace_geom_version();")
          SUB=$(psql  -tA -d laplace -U laplace_admin -c "SELECT laplace.laplace_substrate_version();")
          echo "public.laplace_geom_version()       → '$GEOM'"
          echo "laplace.laplace_substrate_version() → '$SUB'"
          [ "$GEOM" = "0.1.0" ] && [ "$SUB" = "0.1.0" ] || {
            echo "::error::Version mismatch — expected '0.1.0' from both"; exit 1; }
          echo "::notice::Both substrate extensions report 0.1.0; engine link chain verified"

      - name: DbUp status
        run: |
          cd app
          dotnet run --project Laplace.Migrations/Laplace.Migrations.csproj -c Release -- status

      - name: Role grants in place
        run: |
          psql -d laplace -U laplace_admin -tAc "
            SELECT has_schema_privilege('laplace_app', 'laplace', 'USAGE'),
                   has_schema_privilege('laplace_readonly', 'laplace', 'USAGE');
          " | sed 's/^/  /'

      - name: Seed Unicode T0 (THE ONE ingest path — consensus folds, layer-0 marker set)
        run: |
          cd app
          dotnet run --project Laplace.Cli/Laplace.Cli.csproj -c Release -- ingest unicode

  # ------------------------------------------------------------------
  # dotnet-test — C# test suites.
  # ------------------------------------------------------------------
  dotnet-test:
    name: dotnet test (engine bindings + substrate integration)
    needs: db-deploy
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }

      - uses: ./.github/actions/setup-laplace-env

      - name: dotnet test
        run: |
          cd app
          for proj in \
            Laplace.Engine.Core.Tests \
            Laplace.Engine.Dynamics.Tests \
            Laplace.Engine.Synthesis.Tests \
            Laplace.Decomposers.Abstractions.Tests \
            Laplace.Decomposers.Containers.Abstractions.Tests \
            Laplace.SubstrateCRUD.Tests \
            Laplace.Ingestion.Tests \
            Laplace.Decomposers.Unicode.Tests \
            Laplace.Decomposers.Model.Tests; do
            echo "::group::dotnet test $proj"
            dotnet test "$proj/$proj.csproj" -c Release
            echo "::endgroup::"
          done

  # ------------------------------------------------------------------
  # regress — pg_regress smoke tests.
  # ------------------------------------------------------------------
  regress:
    name: pg_regress smoke (laplace_geom + laplace_substrate)
    needs: db-deploy
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }

      - uses: ./.github/actions/setup-laplace-env

      - name: ctest -L regress
        run: ctest --test-dir build --output-on-failure -L regress

      - name: Show regress diffs on failure
        if: failure()
        run: |
          for f in build/extension/*/tests/regress_output/regression.diffs; do
            [ -f "$f" ] || continue
            echo "::group::$f"
            cat "$f"
            echo "::endgroup::"
          done

  # ------------------------------------------------------------------
  # Data pipeline — modular reusable workflows so THIS orchestrator stays small.
  # Each stage is an individually-visible step inside its module file:
  #   .github/workflows/seed-ladder.yml     (one step per source ingest)
  #   .github/workflows/model-pipeline.yml  (ingest → consensus → query → synth → GGUF)
  # ------------------------------------------------------------------
  seed-ladder:
    name: Seed ladder
    needs: [regress, dotnet-test]
    uses: ./.github/workflows/seed-ladder.yml
    with:
      full_ladder: ${{ inputs.full_ladder || false }}

  model-pipeline:
    name: Model pipeline
    needs: [seed-ladder]
    uses: ./.github/workflows/model-pipeline.yml
