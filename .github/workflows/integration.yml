name: Integration — self-hosted (oneAPI + Postgres + Laplace)

# Self-hosted runner with oneAPI, PG 18, .NET 10 access.
# SECURITY: triggers ONLY on push to main + workflow_dispatch.
# DO NOT add `pull_request` triggers — untrusted PR code must NEVER run on the self-hosted runner.
# PR validation is handled by ci.yml on GitHub-hosted disposable VMs.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capabilities:
    name: Verify self-hosted runner capabilities
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4

      - name: System info
        run: |
          echo "::group::OS / kernel"
          uname -a
          cat /etc/os-release | grep -E '^(NAME|VERSION)='
          echo "::endgroup::"

          echo "::group::CPU + AVX support"
          lscpu | grep -E 'Model name|Architecture|^CPU\(s\):'
          grep -oE 'avx[a-z0-9_]*' /proc/cpuinfo | sort -u
          echo "::endgroup::"

          echo "::group::Memory"
          free -h | head -3
          echo "::endgroup::"

      - name: Intel oneAPI present
        run: |
          if [ -d /opt/intel/oneapi ]; then
            echo "✓ oneAPI installed at /opt/intel/oneapi"
            ls /opt/intel/oneapi/compiler/latest/bin/ | head -10
          else
            echo "::error::Intel oneAPI not found at /opt/intel/oneapi"
            exit 1
          fi

      - name: PostgreSQL + PostGIS
        run: |
          if command -v pg_config >/dev/null 2>&1; then
            pg_config --version
            pg_config --includedir-server
          else
            echo "::error::pg_config not found"
            exit 1
          fi

      - name: .NET SDK
        run: |
          if command -v dotnet >/dev/null 2>&1; then
            dotnet --version
            dotnet --list-sdks
          else
            echo "::error::dotnet not found"
            exit 1
          fi

      - name: Eigen + ICU + BLAKE3 toolchain
        run: |
          pkg-config --modversion eigen3 || echo "::warning::eigen3 pkg-config not found"
          pkg-config --modversion icu-uc || echo "::warning::ICU not found"

      - name: Peer auth (laplace-runner → laplace_admin) per ADR 0019
        run: |
          # Per ADR 0019 the runner is the laplace-runner system account.
          # Peer auth resolves it to the laplace_admin PG role on local socket.
          RESULT=$(psql -d postgres -tAc "SELECT current_user || ' on ' || current_database();")
          echo "Peer-auth probe: $RESULT"
          if [ "$RESULT" != "laplace_admin on postgres" ]; then
            echo "::error::Expected 'laplace_admin on postgres', got '$RESULT'"
            echo "::error::Run: sudo scripts/bootstrap-laplace-runner.sh bootstrap"
            exit 1
          fi

  build:
    name: Build engine + extension + app + migrations
    needs: capabilities
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4

      - name: Build engine (CMake + Ninja, fetches Spectra + BLAKE3)
        run: |
          cd engine
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run engine tests
        run: |
          cd engine/build
          ctest --output-on-failure

      - name: Build PG extension (PGXS)
        run: |
          cd extension
          make PG_CONFIG=/usr/lib/postgresql/18/bin/pg_config

      - name: Build C# app + migrations
        run: |
          cd app
          dotnet build Laplace.slnx -c Release

  # Layer 1 — extension lifecycle (ADR 0023): install extension binaries,
  # then DbUp orchestrates EnsureDatabase + CREATE EXTENSION + role grants.
  db-ensure:
    name: Install extension + apply DbUp migrations (Layer 1)
    needs: build
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4

      - name: Build + install PG extension (bounded sudo, per ADR 0019)
        run: |
          cd extension
          make PG_CONFIG=/usr/lib/postgresql/18/bin/pg_config
          sudo make install PG_CONFIG=/usr/lib/postgresql/18/bin/pg_config

      - name: DbUp — EnsureDatabase('laplace') + apply migrations
        run: |
          cd app
          dotnet run \
            --project Laplace.Migrations/Laplace.Migrations.csproj \
            -c Release -- up

      - name: Verify extensions installed at expected version
        run: |
          psql -d laplace -tAc "\dx" | sed 's/^/  /'
          VERSION=$(psql -d laplace -tAc "SELECT laplace.laplace_version();")
          echo "laplace.laplace_version() → '$VERSION'"
          EXPECTED=$(awk -F"'" '/^default_version/{print $2}' extension/laplace.control)
          if [ "$VERSION" != "$EXPECTED" ]; then
            echo "::error::Version mismatch: extension reports '$VERSION', .control declares '$EXPECTED'"
            exit 1
          fi
          echo "::notice::laplace extension at version $VERSION (matches .control)"

      - name: DbUp status
        run: |
          cd app
          dotnet run \
            --project Laplace.Migrations/Laplace.Migrations.csproj \
            -c Release -- status

  # Smoke test runs against the agent-managed 'laplace' database directly
  # (not an ephemeral DB) — the substrate is the substrate; CI verifies
  # the deployed instance survives a push-to-main rebuild.
  extension-smoke-test:
    name: Smoke-test laplace extension
    needs: db-ensure
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4

      - name: laplace_version() returns expected version
        run: |
          EXPECTED=$(awk -F"'" '/^default_version/{print $2}' extension/laplace.control)
          RESULT=$(psql -tA -d laplace -c "SELECT laplace.laplace_version();")
          echo "laplace_version() returned: '$RESULT' (expected '$EXPECTED')"
          if [ "$RESULT" != "$EXPECTED" ]; then
            echo "::error::Expected '$EXPECTED', got '$RESULT'"
            exit 1
          fi
          echo "::notice::laplace_version() OK"

      - name: Required extensions present
        run: |
          psql -d laplace -c "\dx" -P "footer=off"
          for ext in postgis laplace; do
            if ! psql -d laplace -tAc "SELECT 1 FROM pg_extension WHERE extname='$ext';" | grep -q 1; then
              echo "::error::Extension '$ext' not present"
              exit 1
            fi
          done

      - name: Role grants in place
        run: |
          # laplace_app should be able to USAGE the laplace schema
          psql -d laplace -tAc "
            SELECT has_schema_privilege('laplace_app', 'laplace', 'USAGE'),
                   has_schema_privilege('laplace_readonly', 'laplace', 'USAGE');
          " | sed 's/^/  /'

  # Future jobs (per .agent/status/plan.md):
  # - pg_regress test-extension (Chunk 2+; after laplace--*.sql has real functions)
  # - test-app (dotnet test) (Chunk 1+; after C# tests exist)
  # - verify-determinism, verify-fk, verify-perfcache (Chunk 3+)
  # - round-trip end-to-end test (Chunk 8)
  # All trigger only on push to main / workflow_dispatch — never PRs from forks.
