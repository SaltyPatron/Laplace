name: Infrastructure / tooling
description: CI, build tooling, repo configuration, runner, etc.
title: "infra: <summary>"
labels: ["area:infra"]
body:
  - type: textarea
    id: what
    attributes:
      label: What
      description: One paragraph — what infrastructure change is being proposed
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why
      description: What problem does this solve? What friction does it remove?
    validations:
      required: true

  - type: textarea
    id: how
    attributes:
      label: How (proposed)
      description: Concrete steps to land this
    validations:
      required: true

  - type: textarea
    id: risk
    attributes:
      label: Risks / tradeoffs
      description: What could go wrong; what alternatives were considered
