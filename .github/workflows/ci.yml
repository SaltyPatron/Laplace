name: CI — docs + alignment checks

# GitHub-hosted runners (free for public repos).
# Safe for PR validation: runs on disposable VMs; untrusted code can't escape.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint (advisory)
        # advisory: doesn't fail CI yet — adopt a strict ruleset later
        continue-on-error: true
        run: markdownlint --disable MD013 MD024 MD033 MD034 MD036 MD041 -- '**/*.md' '!node_modules/**' || true

  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links in markdown
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
        continue-on-error: true

  anti-vocabulary-scan:
    name: Banned conventional-AI vocabulary scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for unflagged banned terms
        # CLAUDE.md and the skeptic agent ARE allowed to mention banned terms.
        # Other files should not mention them except as explicit rejection.
        # ENFORCING: a gate that never fails is a fake gate.
        run: |
          set +e
          banned_terms=(
            "HNSWLib" "hnswlib" "FAISS" "ScaNN" "Milvus" "Pinecone"
            "oneDNN" "cuDNN"
          )
          files_to_scan=$(find . -type f \( -name '*.md' -o -name '*.h' -o -name '*.hpp' -o -name '*.cpp' -o -name '*.c' -o -name '*.cs' -o -name '*.sql' \) \
            ! -path './.git/*' ! -path './node_modules/*')
          violations=0
          for term in "${banned_terms[@]}"; do
            while IFS= read -r match; do
              file=$(echo "$match" | cut -d: -f1)
              # Allow mentions in CLAUDE.md, the conventional-ai-skeptic agent,
              # and this workflow file (which defines the banned list itself).
              case "$file" in
                ./CLAUDE.md|./.claude/agents/conventional-ai-skeptic.md|./.github/workflows/ci.yml)
                  ;;
                *)
                  echo "::warning file=$file::Banned term '$term' appears outside allowed files"
                  violations=$((violations+1))
                  ;;
              esac
            done < <(grep -nH "$term" $files_to_scan 2>/dev/null)
          done
          echo "Total unflagged banned-term occurrences: $violations"
          exit "$violations"
