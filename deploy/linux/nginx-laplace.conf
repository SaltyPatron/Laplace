# Laplace API reverse proxy (LAN-only).
# Coexists with the existing name-based vhosts (minecraft, etc.) by taking a
# dedicated port — nothing else needs to move. Reachable on the LAN at
#   http://hart-server:8080  or  http://<lan-ip>:8080
# Installed to /etc/nginx/sites-available/laplace and symlinked into
# sites-enabled by bootstrap-host.sh.
server {
    listen 8080;
    listen [::]:8080;
    server_name hart-server _;

    # Substrate payloads (turn witnesses, reports) can be large.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:5187;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events / streamed completions: no buffering, long reads.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    access_log /var/log/nginx/laplace-access.log;
    error_log  /var/log/nginx/laplace-error.log;
}
