name: Seed ladder (reusable)

on:
  workflow_call:
    inputs:
      full_ladder:
        description: "Also ingest the multi-hour corpora (tatoeba/conceptnet/wiktionary/atomic2020/opensubtitles)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  unicode:
    uses: ./.github/workflows/unicode.yml
  iso639:
    needs: unicode
    uses: ./.github/workflows/iso639.yml

  wordnet:
    needs: iso639
    uses: ./.github/workflows/wordnet.yml
  ud:
    needs: iso639
    uses: ./.github/workflows/ud.yml
  verbnet:
    needs: iso639
    uses: ./.github/workflows/verbnet.yml
  propbank:
    needs: iso639
    uses: ./.github/workflows/propbank.yml

  tatoeba:
    needs: iso639
    if: ${{ inputs.full_ladder }}
    uses: ./.github/workflows/tatoeba.yml
  conceptnet:
    needs: iso639
    if: ${{ inputs.full_ladder }}
    uses: ./.github/workflows/conceptnet.yml
  wiktionary:
    needs: iso639
    if: ${{ inputs.full_ladder }}
    uses: ./.github/workflows/wiktionary.yml
  atomic2020:
    needs: iso639
    if: ${{ inputs.full_ladder }}
    uses: ./.github/workflows/atomic2020.yml
  opensubtitles:
    needs: iso639
    if: ${{ inputs.full_ladder }}
    uses: ./.github/workflows/opensubtitles.yml

  omw:
    needs: wordnet
    uses: ./.github/workflows/omw.yml
  framenet:
    needs: wordnet
    uses: ./.github/workflows/framenet.yml
  mapnet:
    needs: [wordnet, framenet]
    uses: ./.github/workflows/mapnet.yml
  wordframenet:
    needs: [wordnet, framenet]
    uses: ./.github/workflows/wordframenet.yml
  semlink:
    needs: [wordnet, verbnet, propbank, framenet]
    uses: ./.github/workflows/semlink.yml

  convergence:
    name: "report — cross-source convergence"
    needs: [ud, omw, semlink, atomic2020, opensubtitles]
    if: >-
      ${{ !cancelled()
          && needs.ud.result == 'success'
          && needs.omw.result == 'success'
          && needs.semlink.result == 'success'
          && (needs.atomic2020.result == 'success' || needs.atomic2020.result == 'skipped')
          && (needs.opensubtitles.result == 'success' || needs.opensubtitles.result == 'skipped') }}
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - name: report
        run: |
          m=$(psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -tAc \
            "SELECT laplace.multi_source_entity_count();")
          echo "::notice::multi-source entities=$m"
