name: propbank

# layer 2 · rolesets
# Thin per-source workflow (2026-06-05 modular CI): dispatchable alone
# (deploy=true brings the runner current first) and composable by
# seed-ladder.yml. The ingest/gate implementation lives in _ingest.yml.

on:
  workflow_dispatch:
    inputs:
      database:
        description: "target DB"
        type: choice
        options: [laplace, laplace-dev]
        default: laplace
      deploy:
        description: "build+install+migrate first"
        type: boolean
        default: true
  workflow_call:
    inputs:
      database:
        type: string
        default: "laplace"
      deploy:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ inputs.deploy }}
    uses: ./.github/workflows/_build-deploy.yml
    with:
      database: ${{ inputs.database }}

  ingest:
    needs: deploy
    if: ${{ !cancelled() && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped') }}
    uses: ./.github/workflows/_ingest.yml
    with:
      source: propbank
      timeout-minutes: 60
      database: ${{ inputs.database }}
      gate: |
        HAS_SEMANTIC_ROLE 10000
        HAS_SENSE 5000
