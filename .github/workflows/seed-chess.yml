name: Seed — chess

# The chess modality as its own phase. Each choice is a distinct decomposer, one
# per run (no bucket):
#   chess        — PGN games: record (ChessPgn) + substrate analyze pass
#   openings     — opening book (ChessOpenings)
#   chess-books  — annotated chess books (ChessBook): record + derive in one pass
#   chess-eval   — stockfish eval census over recorded games (ChessStockfish): the
#                  calculated eval layer is DERIVED STATE — this step is what makes it
#                  survive a db-reset, exactly like every other seed re-derives its
#                  layer. No path (the substrate is the source); marker-gated, so
#                  re-runs skip already-evaluated games.
# Corpus sources take an explicit corpus dir (no DATA_ROOT default); chess-eval takes none.
# Delegates to _ingest.yml; chess is not in decomposer-gates.json, so run_gate:false.

on:
  workflow_dispatch:
    inputs:
      source:
        description: "chess source (one per run)"
        type: choice
        required: true
        options: [chess, openings, chess-books, chess-eval]
      path:
        description: "corpus dir (e.g. /vault/Data/Games/Chess) — required for corpus sources, empty for chess-eval"
        type: string
        required: false
        default: ""
      database:
        description: "target DB (one database: laplace)"
        type: choice
        options: [laplace]
        default: laplace

permissions:
  contents: read

jobs:
  seed:
    uses: ./.github/workflows/_ingest.yml
    with:
      source: ${{ inputs.source }}
      path: ${{ inputs.path }}
      database: ${{ inputs.database }}
      timeout_minutes: 720
      run_gate: false
      run_idempotency: false
