name: Seed ladder (reusable)

# Ingest the seed sources ONE AT A TIME, each its own visible step, in dependency
# order (ADR 0037). OMW lands right after WordNet (the synset scaffold it maps onto)
# and BEFORE ud/the big corpora, so those witness onto OMW's multilingual lexemes
# instead of racing to create them. Runs on the SAME `laplace` DB the model pipeline
# then extends вЂ” NO nuke between stages (the one clean slate is db-deploy), so seed +
# model witnesses coexist for consensus. Bounded set always; multi-hour corpora only
# when full_ladder=true. Called by integration.yml.
on:
  workflow_call:
    inputs:
      full_ladder:
        description: "Also ingest the multi-hour corpora (tatoeba/conceptnet/wiktionary/atomic2020)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  seed-ladder:
    name: sources ingested one at a time
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }

      - uses: ./.github/actions/setup-laplace-env

      # --- one source per step, dependency order. unicode re-ingest sets the
      #     HasLayerCompleted/0 marker that unblocks iso639 (db-deploy's seed does not). ---
      - name: "ingest вЂ” unicode (layer 0 В· sets layer marker)"
        run: scripts/ingest-source.sh unicode
      - name: "ingest вЂ” iso639 (layer 1 В· languages/scripts reference + graph)"
        run: scripts/ingest-source.sh iso639
      - name: "verify вЂ” language graph navigable (filter/focus by script & macrolanguage)"
        run: |
          P(){ psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -tAc "$1"; }
          H=public.laplace_hash128_blake3
          K(){ echo "$H(convert_to('substrate/kind/$1/v1','UTF8'))"; }
          us=$(P "SELECT count(*) FROM laplace.attestations WHERE kind_id=$(K USES_SCRIPT);")
          mm=$(P "SELECT count(*) FROM laplace.attestations WHERE kind_id=$(K MEMBER_OF_MACROLANGUAGE);")
          latin=$(P "SELECT count(*) FROM laplace.attestations WHERE kind_id=$(K USES_SCRIPT) AND object_id=$H(convert_to('unicode/script/Latin/v1','UTF8'));")
          echo "USES_SCRIPT=$us  MEMBER_OF_MACROLANGUAGE=$mm  languagesв†’Latin=$latin"
          [ "${us:-0}" -gt 0 ]      || { echo "::error::no USES_SCRIPT edges вЂ” languageв†”script graph missing"; exit 1; }
          [ "${mm:-0}" -gt 0 ]      || { echo "::error::no MEMBER_OF_MACROLANGUAGE edges вЂ” macrolanguage graph missing"; exit 1; }
          [ "${latin:-0}" -gt 50 ]  || { echo "::error::only $latin languages link to Latin вЂ” codepointв†’scriptв†’language convergence broken"; exit 1; }
          echo "::notice::language graph navigable вЂ” $latin languages use Latin; codepointв†’scriptв†’languageв†’macrolanguage chained, no runtime join"
      - name: "ingest вЂ” wordnet (layer 2 В· English synset scaffold)"
        run: scripts/ingest-source.sh wordnet
      - name: "ingest вЂ” omw (layer 3 В· multilingual lexemes onto the synsets)"
        run: scripts/ingest-source.sh omw
      - name: "ingest вЂ” ud (layer 2 В· syntax / UPOS)"
        run: scripts/ingest-source.sh ud

      # --- big corpora (multi-hour): on demand only, still one visible step each ---
      - name: "ingest вЂ” tatoeba (full ladder В· parallel sentences)"
        if: ${{ inputs.full_ladder }}
        run: scripts/ingest-source.sh tatoeba
      - name: "ingest вЂ” conceptnet (full ladder В· commonsense relations)"
        if: ${{ inputs.full_ladder }}
        run: scripts/ingest-source.sh conceptnet
      - name: "ingest вЂ” wiktionary (full ladder В· dictionary)"
        if: ${{ inputs.full_ladder }}
        run: scripts/ingest-source.sh wiktionary
      - name: "ingest вЂ” atomic2020 (full ladder В· inferential)"
        if: ${{ inputs.full_ladder }}
        run: scripts/ingest-source.sh atomic2020

      - name: "verify вЂ” WordNet landed CONTENT (kind=1 physicalities), not just attestations"
        run: |
          WN="public.laplace_hash128_blake3(convert_to('substrate/source/WordNetDecomposer/v1','UTF8'))"
          PSQL=(psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -tAc)
          c=$("${PSQL[@]}" "SELECT count(*) FROM laplace.physicalities WHERE kind=1 AND source_id=$WN;")
          a=$("${PSQL[@]}" "SELECT count(*) FROM laplace.attestations  WHERE source_id=$WN;")
          echo "WordNet: CONTENT physicalities=$c  attestations=$a"
          [ "${c:-0}" -gt 0 ] || { echo "::error::WordNet emitted no CONTENT physicalities вЂ” content path regressed"; exit 1; }
          [ "${a:-0}" -gt 0 ] || { echo "::error::WordNet emitted no attestations"; exit 1; }

      - name: "report вЂ” cross-source convergence (entities witnessed by >1 source)"
        run: |
          m=$(psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -tAc \
            "SELECT count(*) FROM (SELECT entity_id FROM laplace.physicalities GROUP BY entity_id HAVING count(DISTINCT source_id)>1) t;")
          echo "::notice::multi-source entities=$m"
