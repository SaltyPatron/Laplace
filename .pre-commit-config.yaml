# Pre-commit hooks for Laplace
# Install: `pip install pre-commit && pre-commit install --hook-type commit-msg --hook-type pre-commit`
# Run manually: `pre-commit run --all-files`
#
# Mirrors local-dev checks of what CI verifies — fail fast before pushing.

minimum_pre_commit_version: 3.5.0

repos:
  # === Generic hygiene ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  # === Conventional Commits enforcement ===
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - --types
          - feat,fix,docs,style,refactor,perf,test,chore,build,ci,revert
          - --strict

  # === Markdown lint (advisory; mirrors ci.yml) ===
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args:
          - --disable
          - MD013
          - MD024
          - MD033
          - MD034
          - MD036
          - MD041
        files: '\.md$'
        exclude: '^(\.git/|node_modules/)'

  # === Shell-script lint ===
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: '\.sh$'
        args: [--severity=warning]

  # === Banned-vocabulary scan (mirrors ci.yml anti-vocab job) ===
  - repo: local
    hooks:
      - id: banned-vocabulary
        name: Banned conventional-AI vocabulary scan
        entry: bash -c '
          BANNED="HNSWLib|hnswlib|FAISS|ScaNN|Milvus|Pinecone|oneDNN|cuDNN";
          FILES=$(echo "$@" | tr " " "\n" |
                  grep -vE "^(GLOSSARY|RULES|STANDARDS|DESIGN)\.md$" |
                  grep -vE "^(\.claude/agents/conventional-ai-skeptic|\.github/workflows/ci|\.github/copilot-instructions|\.pre-commit-config|CONTRIBUTING)" |
                  grep -vE "^docs/adr/");
          [ -z "$FILES" ] && exit 0;
          if echo "$FILES" | xargs grep -lE "$BANNED" 2>/dev/null; then
            echo "Banned conventional-AI vocabulary found outside allowed-mentions files.";
            echo "If a banned term must appear here, add the file to the allowlist or move the mention to docs/adr/.";
            exit 1;
          fi;
          exit 0;
        '
        language: system
        files: '\.(md|c|h|cpp|hpp|cs|sql|yml|yaml|sh|toml)$'
        pass_filenames: true
