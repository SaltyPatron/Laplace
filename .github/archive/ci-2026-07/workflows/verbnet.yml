name: verbnet

on:
  workflow_dispatch:
    inputs:
      database:
        description: "target DB"
        type: choice
        options: [laplace, laplace-dev]
        default: laplace
      deploy:
        description: "build+install+migrate first"
        type: boolean
        default: true
  workflow_call:
    inputs:
      database:
        type: string
        default: "laplace"
      deploy:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ inputs.deploy }}
    uses: ./.github/workflows/_build-deploy.yml
    with:
      database: ${{ inputs.database }}

  ingest:
    needs: deploy
    if: ${{ !cancelled() && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped') }}
    uses: ./.github/workflows/_ingest.yml
    with:
      source: verbnet
      timeout-minutes: 60
      database: ${{ inputs.database }}
      gate: |
        HAS_THEMATIC_ROLE 500
        HAS_VERB_FRAME 1000
