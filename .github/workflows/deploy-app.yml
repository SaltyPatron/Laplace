name: deploy-app (build → install → migrate → seed → serve)

# Full app-layer deploy on the self-hosted runner (= hart-server). Unlike a
# decoupled app push, this REBUILDS AND INSTALLS the native engine + Postgres
# extension so /opt/laplace is never stale, re-migrates a fresh DB against the
# just-installed extension, publishes API+SPA, then seeds the ordered ladder
# (each source an individual, validated step). One-time host setup is
# deploy/linux/bootstrap-host.sh.

on:
  workflow_dispatch:
    inputs:
      fresh_db:
        description: "nuke + re-migrate + reseed (required after any engine/extension change)"
        type: boolean
        default: true
      full_ladder:
        description: "also seed the multi-hour corpora (atomic2020/conceptnet/wiktionary/tatoeba/opensubtitles)"
        type: boolean
        default: false
      skip_seed:
        description: "deploy only; do not run the seed ladder"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "engine/**"
      - "extension/**"
      - "app/**"
      - "web/**"
      - "deploy/linux/**"
      - "scripts/ingest-source.sh"
      - ".github/workflows/deploy-app.yml"
      - "Justfile"

permissions:
  contents: read

concurrency:
  group: deploy-app
  cancel-in-progress: false

env:
  PGDATABASE: laplace
  LAPLACE_DATA_ROOT: /vault/Data
  # Bound ingest connection fan-out — the cluster caps at max_connections=100.
  # The real driver is the apply side: ResolveApplyPartitions defaults to
  # clamp(P-core,1,16) connections, multiplied by pipelined batches. Capping it
  # (+ low decompose/fold workers) keeps concurrent connections well under 100
  # even when queries slow under load (what blew CILI's pool at the defaults).
  LAPLACE_INGEST_WORKERS: "2"
  LAPLACE_DECOMPOSE_WORKERS: "2"
  LAPLACE_FOLD_WORKERS: "4"
  LAPLACE_APPLY_PARTITIONS: "6"
  # Language scope: UD/Wiktionary are huge multilingual corpora — English-only
  # per the ingest convention (unscoped UD = 4.3GB of every-language treebanks).
  LAPLACE_UD_LANGS: en
  LAPLACE_WIKTIONARY_LANGS: en

jobs:
  deploy:
    name: build → install → migrate → seed → serve
    runs-on: [self-hosted, laplace]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env

      # Rebuild + install the engine + extension directly via cmake — NOT `just`
      # (the runner's modern `just` rejects the Justfile's blank recipe lines).
      # These mirror the Justfile `build`/`install` recipes; the oneAPI toolchain
      # env + build-tree LD_LIBRARY_PATH come from setup-laplace-env, and the flags
      # match the existing build/CMakeCache.txt (stock PG18 headers, staged install
      # to /opt/laplace). Runs as laplace-runner, which owns /opt/laplace.
      - name: build + install engine + extension → /opt/laplace
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/intel-oneapi.cmake \
            -DLAPLACE_PG_PREFIX="${LAPLACE_PG_PREFIX:-/usr/lib/postgresql/18}" \
            -DCMAKE_INSTALL_PREFIX="${LAPLACE_INSTALL_PREFIX:-/opt/laplace}" \
            -DLAPLACE_INSTALL_STAGED="${LAPLACE_INSTALL_STAGED:-ON}"
          cmake --build build
          umask 0002
          cmake --install build
          # fail loudly if the install did not actually refresh the engine
          test -f /opt/laplace/lib/liblaplace_core.so

      - name: stop API service (release DB + app dir)
        run: sudo systemctl stop laplace-api || true

      - name: build migrations
        run: dotnet build app/Laplace.Migrations/Laplace.Migrations.csproj -c Release

      # fresh_db guarantees the DB carries the just-installed extension's current
      # SQL (CREATE EXTENSION IF NOT EXISTS won't refresh a stale one in place).
      - name: migrate
        run: |
          MIG=app/Laplace.Migrations/bin/Release/net10.0/Laplace.Migrations.dll
          # Reseed is destructive — nuke ONLY on an explicit fresh_db=true dispatch. On push (inputs
          # unset) or any other run we just `up` + the in-place sync step below — no nuke, no data loss.
          # This is what turns a commit into a safe hot-deploy instead of a full reseed.
          if [ "${{ inputs.fresh_db }}" = "true" ]; then
            dotnet "$MIG" nuke --yes
          fi
          dotnet "$MIG" up

      # In-place extension SQL upgrade WITHOUT a reseed. The extension version is a content hash of the
      # SQL (extension/laplace_substrate CMakeLists), and migrate's CREATE EXTENSION is a one-time DbUp
      # script — so a SQL edit alone never reaches an existing DB. Here we reconcile: if the installed
      # version differs from the just-built one, name the idempotent upgrade body for the installed
      # version and ALTER EXTENSION UPDATE — refreshing every function in place, data untouched. So a
      # pure recall/ops/inference SQL change deploys with fresh_db=false in seconds; fresh_db is only
      # for genuinely destructive table/bootstrap migrations now.
      - name: sync extension SQL in place (no reseed)
        run: |
          # Ask Postgres for the versions — robust no matter where the extension dir actually is
          # (CREATE EXTENSION already resolves it; pg_config --sharedir does not always match it).
          AVAIL=$(psql -d laplace -U laplace_admin -tAX -c "SELECT default_version FROM pg_available_extensions WHERE name='laplace_substrate'" | tr -d '[:space:]')
          INSTALLED=$(psql -d laplace -U laplace_admin -tAX -c "SELECT extversion FROM pg_extension WHERE extname='laplace_substrate'" | tr -d '[:space:]')
          echo "laplace_substrate: installed='$INSTALLED' available='$AVAIL'"
          test -n "$AVAIL" || { echo "::error::laplace_substrate missing from pg_available_extensions"; exit 1; }
          if [ -z "$INSTALLED" ]; then
            psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS laplace_substrate"
          elif [ "$INSTALLED" != "$AVAIL" ]; then
            SHARE=$(dirname "$(find /opt/laplace -name laplace_substrate.control -not -path '*/build*' 2>/dev/null | head -1)")
            test -n "$SHARE" || { echo "::error::could not locate installed laplace_substrate.control under /opt/laplace"; exit 1; }
            cp "$SHARE/laplace_substrate_upgrade.sql" "$SHARE/laplace_substrate--$INSTALLED--$AVAIL.sql"
            psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -c "ALTER EXTENSION laplace_substrate UPDATE TO '$AVAIL'"
            echo "OK upgraded laplace_substrate $INSTALLED -> $AVAIL in place (no reseed)"
          else
            echo "OK laplace_substrate already at $AVAIL"
          fi

      # The recall path (resolve_phrase/word_id) mmaps the T0 perfcache via the
      # extension GUC laplace_substrate.perfcache_path. cmake installs the blob to
      # /opt/laplace/share/laplace/; point the cluster at it (PGC_SIGHUP — a reload
      # suffices, no restart). Without this, recall errors "requires the T0 perfcache"
      # even with a fully seeded substrate.
      - name: configure substrate perfcache GUC
        run: |
          BIN=$(find /opt/laplace/share/laplace -name 'laplace_t0_perfcache*.bin' | sort -V | tail -1)
          test -n "$BIN" || { echo "::error::perfcache blob not installed under /opt/laplace/share/laplace"; exit 1; }
          psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 \
            -c "LOAD 'laplace_substrate'" \
            -c "ALTER SYSTEM SET laplace_substrate.perfcache_path = '$BIN'" \
            -c "SELECT pg_reload_conf()"
          echo "perfcache_path -> $BIN"

      - name: publish API + SPA → /opt/laplace/app
        run: bash deploy/linux/deploy.sh

      # Perfcache blob for the ingest CLI (built by `just build`).
      - name: locate T0 perfcache
        if: ${{ inputs.fresh_db == 'true' && !inputs.skip_seed }}
        run: echo "LAPLACE_PERFCACHE_BIN=$(find build -name laplace_t0_perfcache.bin | head -1)" >> "$GITHUB_ENV"

      # ---- seed ladder: ordered, each an individual step ----
      # Foundation linkers — the anchors everything else points into.
      - name: seed unicode (L0 — codepoints + T0 perfcache)
        if: ${{ inputs.fresh_db == 'true' && !inputs.skip_seed }}
        run: scripts/ingest-source.sh unicode
      - name: seed iso639 (L1 — language axis)
        if: ${{ inputs.fresh_db == 'true' && !inputs.skip_seed }}
        run: scripts/ingest-source.sh iso639
      - name: seed cili (L2 — interlingual concept anchors, before wordnet/omw)
        if: ${{ inputs.fresh_db == 'true' && !inputs.skip_seed }}
        run: scripts/ingest-source.sh cili
      - name: seed wordnet (L2 — English lexicon; first real answers)
        if: ${{ inputs.fresh_db == 'true' && !inputs.skip_seed }}
        run: scripts/ingest-source.sh wordnet

      # Core knowledge — independent of the lexicon chain; tolerate absent data.
      - name: seed verbnet/propbank/ud (L2)
        if: ${{ inputs.fresh_db == 'true' && !inputs.skip_seed }}
        run: |
          for s in verbnet propbank ud; do
            echo "::group::seed $s"; scripts/ingest-source.sh "$s" || echo "::warning::seed $s failed (data may be absent)"; echo "::endgroup::"
          done
      - name: seed omw/framenet + bridges (L3 — need wordnet/verbnet/propbank/framenet)
        if: ${{ inputs.fresh_db == 'true' && !inputs.skip_seed }}
        run: |
          for s in omw framenet semlink mapnet wordframenet; do
            echo "::group::seed $s"; scripts/ingest-source.sh "$s" || echo "::warning::seed $s failed (data may be absent)"; echo "::endgroup::"
          done

      # Multi-hour breadth corpora — opt-in only.
      - name: seed full corpora (opt-in)
        if: ${{ inputs.fresh_db == 'true' && !inputs.skip_seed && inputs.full_ladder }}
        run: |
          for s in atomic2020 conceptnet wiktionary tatoeba opensubtitles; do
            echo "::group::seed $s"; scripts/ingest-source.sh "$s" || echo "::warning::seed $s failed"; echo "::endgroup::"
          done

      - name: start API service
        run: sudo systemctl start laplace-api

      # ---- validate / confirm ----
      - name: validate — health, substrate counts, real recall
        run: |
          sleep 3
          echo "== health =="; curl -fsS http://127.0.0.1:5187/health; echo
          echo "== substrate counts =="
          psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -c "SELECT metric, value FROM laplace.substrate_counts();"
          echo "== recall must answer now that wordnet is seeded =="
          curl -fsS -X POST http://127.0.0.1:5187/v1/chat/completions \
            -H 'Content-Type: application/json' -H 'X-Laplace-Tenant: ci' \
            --data '{"model":"laplace-converse-001","messages":[{"role":"user","content":"dog"}]}'
