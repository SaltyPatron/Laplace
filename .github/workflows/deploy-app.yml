name: deploy-app (API + SPA -> hart-server)

# Builds the native engine + extension, the API, and the SPA, then publishes
# the API to /opt/laplace/app and (re)starts the systemd service behind nginx.
# Runs on the self-hosted runner that IS hart-server. One-time host setup
# (systemd unit, nginx vhost, sudoers) must already be done via
# deploy/linux/bootstrap-host.sh.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/Laplace.Endpoints.OpenAICompat/**"
      - "app/Laplace.Api.Contracts/**"
      - "web/**"
      - "deploy/linux/**"
      - ".github/workflows/deploy-app.yml"

permissions:
  contents: read

concurrency:
  group: deploy-app
  cancel-in-progress: false

jobs:
  deploy:
    name: build + publish + restart
    runs-on: [self-hosted, laplace]
    timeout-minutes: 45
    env:
      PGDATABASE: laplace
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }

      - uses: ./.github/actions/setup-laplace-env

      # The native engine + laplace_substrate extension are a separately-built,
      # already-installed dependency under /opt/laplace (like the custom PG/PostGIS).
      # This deploy ships the app layer against them; it does NOT rebuild them.
      - name: verify installed engine + extension
        run: |
          test -f /opt/laplace/lib/liblaplace_core.so \
            || { echo "::error::engine missing at /opt/laplace/lib — run the native build/install first"; exit 1; }
          test -f /opt/laplace/share/postgresql/18/extension/laplace_substrate.control \
            || { echo "::error::laplace_substrate extension not installed under /opt/laplace"; exit 1; }
          echo "engine + extension present."

      - name: build migrations (deploy.sh publishes the API itself)
        run: dotnet build app/Laplace.Migrations/Laplace.Migrations.csproj -c Release

      - name: deploy (publish SPA+API, migrate DB, restart service)
        run: bash deploy/linux/deploy.sh
