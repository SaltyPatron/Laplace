name: Seed ladder (reusable)

# THE ORCHESTRATOR — a thin TRUE-dependency DAG over the per-source workflows
# (2026-06-05 modular re-architecture; this rewrite REPLACES the monolith —
# the first attempt died on an assert and was falsely reported done, caught
# when CI ran the old file). Each box in the UI is one source's workflow
# (expandable); the ingest/gate implementation lives in _ingest.yml; gates
# live with each source; worker knobs live in _ingest.yml ONCE.
# The single self-hosted runner serializes execution, so the DAG declares only
# REAL dependencies (the layer law), not an artificial chain — "Re-run failed
# jobs" resumes exactly the failed source. Bounded mode = minutes-scale
# sources; full_ladder adds the multi-hour corpora and the day-scale
# opensubtitles giant. NO nuke between stages — the one clean slate is
# integration.yml's db-deploy; witnesses coexist on one substrate.

on:
  workflow_call:
    inputs:
      full_ladder:
        description: "Also ingest the multi-hour corpora (tatoeba/conceptnet/wiktionary/atomic2020/opensubtitles)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ── layer 0/1: the reference spine ──
  unicode:
    uses: ./.github/workflows/unicode.yml
  iso639:
    needs: unicode
    uses: ./.github/workflows/iso639.yml

  # ── layer 2 (bounded): lexical core + treebanks + predicate semantics ──
  wordnet:
    needs: iso639
    uses: ./.github/workflows/wordnet.yml
  ud:
    needs: iso639
    uses: ./.github/workflows/ud.yml
  verbnet:
    needs: iso639
    uses: ./.github/workflows/verbnet.yml
  propbank:
    needs: iso639
    uses: ./.github/workflows/propbank.yml

  # ── layer 2 (full ladder): the multi-hour corpora ──
  tatoeba:
    needs: iso639
    if: ${{ inputs.full_ladder }}
    uses: ./.github/workflows/tatoeba.yml
  conceptnet:
    needs: iso639
    if: ${{ inputs.full_ladder }}
    uses: ./.github/workflows/conceptnet.yml
  wiktionary:
    needs: iso639
    if: ${{ inputs.full_ladder }}
    uses: ./.github/workflows/wiktionary.yml
  atomic2020:
    needs: iso639
    if: ${{ inputs.full_ladder }}
    uses: ./.github/workflows/atomic2020.yml
  opensubtitles:
    needs: iso639
    if: ${{ inputs.full_ladder }}
    uses: ./.github/workflows/opensubtitles.yml

  # ── layer 3: builds on layer-2 entities ──
  omw:
    needs: wordnet
    uses: ./.github/workflows/omw.yml
  framenet:
    needs: wordnet
    uses: ./.github/workflows/framenet.yml
  semlink:
    needs: [verbnet, propbank, framenet]
    uses: ./.github/workflows/semlink.yml

  # ── tail: cross-source convergence report (both modes) ──
  convergence:
    name: "report — cross-source convergence"
    needs: [ud, omw, semlink, atomic2020, opensubtitles]
    if: >-
      ${{ !cancelled()
          && needs.ud.result == 'success'
          && needs.omw.result == 'success'
          && needs.semlink.result == 'success'
          && (needs.atomic2020.result == 'success' || needs.atomic2020.result == 'skipped')
          && (needs.opensubtitles.result == 'success' || needs.opensubtitles.result == 'skipped') }}
    runs-on: [self-hosted, laplace]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - name: report
        run: |
          m=$(psql -d laplace -U laplace_admin -v ON_ERROR_STOP=1 -tAc \
            "SELECT laplace.multi_source_entity_count();")
          echo "::notice::multi-source entities=$m"
