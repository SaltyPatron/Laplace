name: New chunk
description: Open a new work-chunk (bounded scope with verifiable acceptance criteria)
title: "Chunk N — <summary>"
labels: ["type:enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to define a new chunk of work. Chunks are the unit of progress in Laplace —
        bounded scope, concrete deliverables, explicit acceptance criteria, CI-gated.


  - type: input
    id: chunk_number
    attributes:
      label: Chunk number
      description: "What chunk number is this? (e.g., 9, 10...)"
      placeholder: "e.g. 9"
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: One paragraph — what's in scope, what's out
      placeholder: "Implement X. Touches Y and Z. Does NOT touch W (that's chunk N+1)."
    validations:
      required: true

  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: Concrete artifacts that must exist when this chunk lands
      value: |
        - [ ] Source file `engine/...`
        - [ ] Tests `engine/test/...`
        - [ ] Documentation update in `DESIGN.md` (if applicable)
        - [ ] Justfile / OPERATIONS.md updates (if applicable)
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: CI-verifiable conditions
      value: |
        - [ ] `just build` passes
        - [ ] `just test` passes
        - [ ] `integration.yml` workflow green on self-hosted runner
        - [ ] (chunk-specific verifier here)
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Pointers to design docs, rules, prior chunks
      value: |
        - DESIGN.md Section ...
        - RULES.md R...
        - Memory: project_laplace_invention.md ... section
        - Predecessor chunks: #N, #M
