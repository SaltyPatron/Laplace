name: _ingest (reusable phase core)

# One implementation of the ingest → (idempotency) → (gate) contract, called by
# every seed-*.yml phase workflow. Staged-and-gated (seed-models.yml extends the
# same shape with synthesize/verify) but source-agnostic: the phase workflow
# supplies the source, path, and which verifications apply. No per-source tuning lives here — worker/commit sizing is
# machine-sized inside the CLI (IngestSizing/CpuTopology); language scope is the
# one operator knob (LAPLACE_INGEST_LANGS, blank = ALL, the witness-manifest law).
#
# Assumes the runner already carries a deployed build (run laplace.yml first if the
# schema or engine changed). Ingest writes PG directly through the CLI — no API dep.

on:
  workflow_call:
    inputs:
      source:
        description: "ingest-source.sh source key (single source per call)"
        type: string
        required: true
      path:
        description: "optional <path> — single file, bare dir, or corpus root (IngestInput.ResolveFiles)"
        type: string
        default: ""
      langs:
        description: "LAPLACE_INGEST_LANGS scope (blank = ALL languages — the default and the law)"
        type: string
        default: ""
      database:
        description: "target DB (one database: laplace)"
        type: string
        default: laplace
      timeout_minutes:
        description: "ingest job timeout — sized to the phase, never the silent 360 default"
        type: number
        default: 720
      run_gate:
        description: "run scripts/decomposer-gate-check.py (only for sources present in decomposer-gates.json)"
        type: boolean
        default: true
      run_idempotency:
        description: "re-ingest and prove the attestation count is stable (no double-count)"
        type: boolean
        default: false
      index_cycle_defer:
        description: >-
          Campaign participation ONLY — default false. When a fresh-full-build campaign has
          dropped the plain secondary indexes up front (`drop-indexes`) and will rebuild them
          once at the end (`recover-indexes`), set this so THIS phase COPYs into the index-free
          heaps without rebuilding the campaign's drops at its run start
          (LAPLACE_INDEX_CYCLE_DEFER). Leave false for every individual re-dispatch: a lone
          source is an increment, and this phase does NOT drop or rebuild anything on its own —
          the drop/rebuild bracket is owned by the campaign, never by a single-source call.
        type: boolean
        default: false

concurrency:
  # Serialize every ingest against a given DB — one ingest at a time (substrate law).
  group: laplace-ingest-${{ inputs.database }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  LAPLACE_DATA_ROOT: /vault/Data
  # Empty (the default) = no cycling: NpgsqlIndexCycle.Deferred reads only "1"/"true".
  # Only a campaign sets index_cycle_defer=true, and even then this phase merely refrains
  # from rebuilding the campaign's up-front drops — it never drops or rebuilds on its own.
  LAPLACE_INDEX_CYCLE_DEFER: ${{ inputs.index_cycle_defer && '1' || '' }}

jobs:
  ingest:
    name: "ingest ${{ inputs.source }} → ${{ inputs.database }}"
    runs-on: [self-hosted, laplace]
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    env:
      LAPLACE_DB: "Host=/var/run/postgresql;Username=laplace_admin;Database=${{ inputs.database }}"
      PGDATABASE: ${{ inputs.database }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env

      - name: Ingest
        run: |
          # Unset LAPLACE_INGEST_LANGS = ALL languages (witness-manifest law).
          # Narrowing a run is an explicit operator decision via the langs input.
          langs="${{ inputs.langs }}"
          [ -n "$langs" ] && export LAPLACE_INGEST_LANGS="$langs"
          echo "source=${{ inputs.source }} db=${{ inputs.database }} path='${{ inputs.path }}' langs='${LAPLACE_INGEST_LANGS:-}' (empty=all)"
          if [ -n "${{ inputs.path }}" ]; then
            scripts/ingest-source.sh "${{ inputs.source }}" "${{ inputs.path }}"
          else
            scripts/ingest-source.sh "${{ inputs.source }}"
          fi

  idempotency:
    name: "verify — re-ingest ${{ inputs.source }} does not double-count"
    needs: ingest
    if: ${{ inputs.run_idempotency && needs.ingest.result == 'success' }}
    runs-on: [self-hosted, laplace]
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    env:
      LAPLACE_DB: "Host=/var/run/postgresql;Username=laplace_admin;Database=${{ inputs.database }}"
      PGDATABASE: ${{ inputs.database }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env

      - name: Re-ingest must be a no-op on the evidence count
        run: |
          P(){ psql -d "${{ inputs.database }}" -U laplace_admin -v ON_ERROR_STOP=1 -tAc "$1"; }
          # Scope the proof to THIS source's evidence — the indexed
          # evidence_count(p_source => source_id(..)) ensure-foundation.sh
          # gates on — instead of two full count(*) sweeps over attestations.
          # Sources without a decomposer-gates.json entry (code lane) keep the
          # unscoped count; the source key -> decomposer source name mapping
          # lives only in that manifest.
          src_name=$(python3 -c "import json; e=json.load(open('scripts/decomposer-gates.json'))['sources'].get('${{ inputs.source }}'); print(e['decomposer'] if e else '')")
          if [ -n "$src_name" ]; then
            count_sql="SELECT laplace.evidence_count(p_source => laplace.source_id('$src_name'));"
            scope="evidence for source $src_name"
          else
            count_sql="SELECT count(*) FROM laplace.attestations;"
            scope="attestations (unscoped — '${{ inputs.source }}' not in decomposer-gates.json)"
          fi
          before=$(P "$count_sql")
          echo "$scope before re-ingest: ${before}"
          langs="${{ inputs.langs }}"; [ -n "$langs" ] && export LAPLACE_INGEST_LANGS="$langs"
          if [ -n "${{ inputs.path }}" ]; then
            scripts/ingest-source.sh "${{ inputs.source }}" "${{ inputs.path }}"
          else
            scripts/ingest-source.sh "${{ inputs.source }}"
          fi
          after=$(P "$count_sql")
          echo "$scope after  re-ingest: ${after}"
          [ "${before}" = "${after}" ] || {
            echo "::error::idempotency broken — ${scope} grew ${before} → ${after} on re-ingest (double-count)"; exit 1; }
          echo "::notice::idempotent — ${scope} unchanged at ${after} on re-ingest"

  gate:
    name: "gate — ${{ inputs.source }} consensus checks"
    needs: [ingest, idempotency]
    # always(): idempotency is skipped when run_idempotency=false; still gate once ingest is green.
    if: ${{ always() && inputs.run_gate && needs.ingest.result == 'success' && needs.idempotency.result != 'failure' }}
    runs-on: [self-hosted, laplace]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env

      - name: Decomposer consensus + layer gates
        run: |
          python3 scripts/decomposer-gate-check.py \
            --source "${{ inputs.source }}" \
            --dbname "${{ inputs.database }}" \
            --host /var/run/postgresql \
            --user laplace_admin
