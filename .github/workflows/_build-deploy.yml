name: _build-deploy (reusable)

on:
  workflow_call:
    inputs:
      database:
        type: string
        default: "laplace"

permissions:
  contents: read

jobs:
  deploy:
    name: "build + install + migrate (${{ inputs.database }})"
    runs-on: [self-hosted, laplace]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false, clean: false }
      - uses: ./.github/actions/setup-laplace-env
      - name: build + install + migrate
        env:
          PGDATABASE: ${{ inputs.database }}
          LAPLACE_DBNAME: ${{ inputs.database }}
        run: bash scripts/pipeline.sh --mode build-only
      - name: migrate up
        env:
          PGDATABASE: ${{ inputs.database }}
        run: |
          dotnet build app/Laplace.Migrations/Laplace.Migrations.csproj -c Release
          dotnet app/Laplace.Migrations/bin/Release/net10.0/Laplace.Migrations.dll up
